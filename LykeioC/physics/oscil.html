<script>
    // --------------------------------------------------------------
    // Ερωτήσεις Πολλαπλής Επιλογής (1-25) – ακριβές κείμενο από PDF

    const mcQuestions = [
        { id: 1, text: "Σε μια Απλή Αρμονική Ταλάντωση (Α.Α.Τ.), αν τετραπλασιάσουμε την ολική ενέργεια Ε, το πλάτος ταλάντωσης Α:", 
          options: ["α. Διπλασιάζεται.", "β. Τετραπλασιάζεται.", "γ. Παραμένει σταθερό.", "δ. Υποδιπλασιάζεται."], 
          correct: "α", 
          justification: "Η ολική ενέργεια είναι \\(E = \\frac{1}{2} D A^2\\). Άρα \\(A = \\sqrt{\\frac{2E}{D}}\\). Αν η ενέργεια γίνει \\(4E\\), το νέο πλάτος θα είναι \\(A' = \\sqrt{\\frac{2(4E)}{D}} = 2\\sqrt{\\frac{2E}{D}} = 2A\\)." },
        { id: 2, text: "Ένα σώμα εκτελεί Α.Α.Τ. και τη χρονική στιγμή t = 0 βρίσκεται στη θέση x = +Α. Η αρχική φάση φ₀ είναι:", 
          options: ["α. 0", "β. π", "γ. π/2", "δ. 3π/2"], 
          correct: "γ", 
          justification: "Η εξίσωση είναι \\(x = A \\text{ημ}(\\omega t + \\phi_0)\\). Για t = 0 έχουμε \\(A = A \\text{ημ}\\phi_0 \\Rightarrow \\text{ημ}\\phi_0 = 1\\), άρα \\(\\phi_0 = \\pi/2\\)." },
        { id: 3, text: "Η σταθερά επαναφοράς D σε ένα σύστημα ελατηρίου-μάζας που ταλαντώνεται οριζόντια ισούται με:", 
          options: ["α. mω", "β. k (σταθερά ελατηρίου)", "γ. 1/k", "δ. mg"], 
          correct: "β", 
          justification: "Για το ελατήριο η δύναμη επαναφοράς είναι η δύναμη του ελατηρίου \\(F = -kx\\), άρα η σταθερά αναλογίας D ταυτίζεται με την k." },
        { id: 4, text: "Στη φθίνουσα μηχανική ταλάντωση όπου \\(F_{αντ} = -bv\\), η περίοδος Τ:", 
          options: ["α. Αυξάνεται καθώς μειώνεται το πλάτος.", "β. Μειώνεται καθώς μειώνεται το πλάτος.", "γ. Παραμένει σταθερή για συγκεκριμένη τιμή των b, m, D.", "δ. Είναι ανεξάρτητη από τη σταθερά απόσβεσης b."], 
          correct: "γ", 
          justification: "Για μικρές αποσβέσεις, η ταλάντωση θεωρείται ισόχρονη, δηλαδή η περίοδος παραμένει σταθερή παρά τη μείωση του πλάτους." },
        { id: 5, text: "Κατά το συντονισμό μιας εξαναγκασμένης ταλάντωσης, η ενέργεια μεταφέρεται από το διεγέρτη στο σύστημα:", 
          options: ["α. Με το ελάχιστο δυνατό ρυθμό.", "β. Μόνο στην αρχή της κίνησης.", "γ. Με το βέλτιστο (μέγιστο) τρόπο.", "δ. Και το πλάτος παραμένει μηδέν."], 
          correct: "γ", 
          justification: "Ορισμός του συντονισμού είναι η μεγιστοποίηση του πλάτους επειδή η συχνότητα του διεγέρτη ταυτίζεται με την ιδιοσυχνότητα (f = f₀)." },
        { id: 6, text: "Σε μια Α.Α.Τ., η συχνότητα μεταβολής της δυναμικής ενέργειας είναι f_U. Αν η συχνότητα της ταλάντωσης είναι f, τότε:", 
          options: ["α. \\(f_U = f\\)", "β. \\(f_U = 2f\\)", "γ. \\(f_U = f/2\\)", "δ. \\(f_U = 4f\\)"], 
          correct: "β", 
          justification: "Η δυναμική ενέργεια μηδενίζεται δύο φορές σε κάθε περίοδο της ταλάντωσης, άρα η περιοδικότητά της είναι διπλάσια από αυτή της απομάκρυνσης." },
        { id: 7, text: "Η μέγιστη επιτάχυνση \\(a_{max}\\) ενός σώματος σε Α.Α.Τ. είναι ανάλογη με:", 
          options: ["α. Το πλάτος Α.", "β. Το τετράγωνο της περιόδου Τ.", "γ. Την ταχύτητα ν.", "δ. Τη μάζα m."], 
          correct: "α", 
          justification: "\\(a_{max} = \\omega^2 A\\). Για δεδομένη συχνότητα, η επιτάχυνση είναι ευθέως ανάλογη του πλάτους." },
        { id: 8, text: "Όταν ένας ταλαντωτής διέρχεται από τη θέση ισορροπίας:", 
          options: ["α. Η δύναμη επαναφοράς είναι μέγιστη.", "β. Η δυναμική ενέργεια είναι μέγιστη.", "γ. Η ταχύτητα είναι μέγιστη.", "δ. Η επιτάχυνση είναι μέγιστη."], 
          correct: "γ", 
          justification: "Στη θέση x = 0, η δυναμική ενέργεια είναι μηδέν και όλη η ενέργεια είναι κινητική, άρα η ταχύτητα παίρνει τη μέγιστη τιμή της." },
        { id: 9, text: "Σε μια φθίνουσα ταλάντωση, ο λόγος δύο διαδοχικών πλατών \\(A_n/A_{n+1}\\):", 
          options: ["α. Αυξάνεται με το χρόνο.", "β. Μειώνεται με το χρόνο.", "γ. Παραμένει σταθερός.", "δ. Είναι ίσος με μονάδα."], 
          correct: "γ", 
          justification: "Η μείωση του πλάτους είναι εκθετική (\\(A = A_0 e^{-\\Lambda t}\\)), οπότε ο λόγος μεγίστων απομακρύνσεων προς την ίδια κατεύθυνση είναι σταθερός." },
        { id: 10, text: "Αν αυξήσουμε τη σταθερά απόσβεσης b σε μια εξαναγκασμένη ταλάντωση, τότε στο συντονισμό:", 
          options: ["α. Το μέγιστο πλάτος αυξάνεται.", "β. Το μέγιστο πλάτος μειώνεται.", "γ. Η ιδιοσυχνότητα f₀ διπλασιάζεται.", "δ. Το πλάτος γίνεται άπειρο."], 
          correct: "β", 
          justification: "Όσο μεγαλύτερη είναι η απόσβεση, τόσο χαμηλότερη είναι η κορυφή της καμπύλης συντονισμού." },
        { id: 11, text: "Η δύναμη επαναφοράς στην Α.Α.Τ. \\(F = -Dx\\) έχει πάντα:", 
          options: ["α. Την ίδια φορά με την απομάκρυνση.", "β. Φορά προς τη θέση ισορροπίας.", "γ. Σταθερό μέτρο.", "δ. Την ίδια φορά με την ταχύτητα."], 
          correct: "β", 
          justification: "Το αρνητικό πρόσημο δείχνει ότι η δύναμη αντιτίθεται στην απομάκρυνση, προσπαθώντας να επαναφέρει το σώμα στο σημείο με x=0 (θέση ισορροπίας)." },
        { id: 12, text: "Ένα σώμα κάνει Α.Α.Τ. με πλάτος Α. Στη θέση x = Α/2, ο λόγος της δυναμικής ενέργειας U προς την ολική ενέργεια Ε είναι:", 
          options: ["α. 1/2", "β. 1/4", "γ. 1/8", "δ. \\(\\sqrt{2}/2\\)"], 
          correct: "β", 
          justification: "\\(U = \\frac{1}{2} D(A/2)^2 = \\frac{1}{4} \\left(\\frac{1}{2} D A^2\\right) = \\frac{1}{4} E\\). Άρα \\(U/E = 1/4\\)." },
        { id: 13, text: "Στη φθίνουσα ταλάντωση, η μηχανική ενέργεια του συστήματος:", 
          options: ["α. Διατηρείται σταθερή.", "β. Μετατρέπεται σε θερμότητα λόγω του έργου των δυνάμεων αντίστασης.", "γ. Αυξάνεται εκθετικά.", "δ. Είναι πάντα ίση με την κινητική ενέργεια."], 
          correct: "β", 
          justification: "Η δύναμη απόσβεσης παράγει πάντα αρνητικό έργο, αφαιρώντας ενέργεια που διαχέεται στο περιβάλλον ως θερμότητα." },
        { id: 14, text: "Μια εξαναγκασμένη ταλάντωση εκτελείται με συχνότητα \\(f_{ταλ}\\). Αν \\(f_δ\\) είναι η συχνότητα του διεγέρτη και \\(f_0\\) η ιδιοσυχνότητα, τότε:", 
          options: ["α. \\(f_{ταλ} = f_0\\)", "β. \\(f_{ταλ} = f_δ\\)", "γ. \\(f_{ταλ} = (f_δ+f_0)/2\\)", "δ. \\(f_{ταλ} = f_δ - f_0\\)"], 
          correct: "β", 
          justification: "Στην εξαναγκασμένη ταλάντωση, το σύστημα υποχρεώνεται να ακολουθήσει τη συχνότητα που του επιβάλλει ο διεγέρτης." },
        { id: 15, text: "Η περίοδος Τ ενός συστήματος ελατηρίου-μάζας στην Α.Α.Τ. εξαρτάται από:", 
          options: ["α. Το πλάτος της ταλάντωσης.", "β. Την αρχική φάση.", "γ. Τη μάζα του σώματος και τη σταθερά του ελατηρίου.", "δ. Την επιτάχυνση της βαρύτητας g."], 
          correct: "γ", 
          justification: "\\(T = 2\\pi\\sqrt{m/D}\\). Εφόσον \\(D = k\\), η περίοδος καθορίζεται μόνο από την αδράνεια (m) και τη σκληρότητα του ελατηρίου (k)." },
        { id: 16, text: "Σε μια Α.Α.Τ., όταν η κινητική ενέργεια Κ είναι μέγιστη, η επιτάχυνση α είναι:", 
          options: ["α. Μέγιστη.", "β. Μηδέν.", "γ. \\(a = \\omega^2 A\\).", "δ. Ίση με g."], 
          correct: "β", 
          justification: "Η Κ είναι μέγιστη στη θέση ισορροπίας (x = 0). Εκεί η δύναμη επαναφοράς είναι \\(F = -D·0 = 0\\), άρα και η επιτάχυνση \\(a = F/m\\) είναι μηδέν." },
        { id: 17, text: "Το πλάτος μιας φθίνουσας ταλάντωσης μειώνεται κατά 10% σε κάθε περίοδο. Μετά από δύο περιόδους, το πλάτος θα είναι:", 
          options: ["α. 0,80A₀", "β. 0,81A₀", "γ. 0,90A₀", "δ. 0,20A₀"], 
          correct: "β", 
          justification: "Μετά την 1η περίοδο \\(A_1 = 0,9A_0\\). Μετά τη 2η, \\(A_2 = 0,9A_1 = 0,9(0,9A_0) = 0,81A_0\\)." },
        { id: 18, text: "Η μέγιστη ταχύτητα στην Α.Α.Τ. δίνεται από τη σχέση:", 
          options: ["α. \\(v_{max} = \\omega A\\)", "β. \\(v_{max} = \\omega^2 A\\)", "γ. \\(v_{max} = \\omega/A\\)", "δ. \\(v_{max} = 2\\pi f^2 A\\)"], 
          correct: "α", 
          justification: "Προκύπτει από τον ρυθμό μεταβολής της απομάκρυνσης \\(x = A\\text{ημ}\\omega t\\)." },
        { id: 19, text: "Ποιο από τα παρακάτω μεγέθη δεν μεταβάλλεται αν διπλασιάσουμε το πλάτος μιας Α.Α.Τ.;", 
          options: ["α. Η μέγιστη ταχύτητα.", "β. Η ολική ενέργεια.", "γ. Η περίοδος.", "δ. Η μέγιστη δύναμη επαναφοράς."], 
          correct: "γ", 
          justification: "Η περίοδος Τ εξαρτάται μόνο από τα m, D, όχι από το πλάτος Α." },
        { id: 20, text: "Στο φαινόμενο του συντονισμού, η καμπύλη συντονισμού δείχνει τη σχέση:", 
          options: ["α. Ενέργειας - Χρόνου.", "β. Πλάτους - Συχνότητας διεγέρτη.", "γ. Ταχύτητας - Απομάκρυνσης.", "δ. Δύναμης - Μάζας."], 
          correct: "β", 
          justification: "Η καμπύλη απεικονίζει πώς μεταβάλλεται το πλάτος της ταλάντωσης Α σε συνάρτηση με τη συχνότητα του διεγέρτη f." },
        { id: 21, text: "Ένα σώμα εκτελεί Α.Α.Τ. με φ₀ = 0. Τη χρονική στιγμή t = T/4:",

          justification: "Για t = T/4, η φάση είναι \\(\\omega t = (2\\pi/T)(T/4) = \\pi/2\\). Τότε \\(x = A\\text{ημ}(\\pi/2) = A\\) (ακραία θέση), όπου η ταχύτητα μηδενίζεται στιγμιαία." },
        { id: 22, text: "Στη φθίνουσα ταλάντωση όπου το πλάτος μειώνεται εκθετικά με το χρόνο, η δύναμη απόσβεσης είναι πάντα:",

          justification: "Η δύναμη \\(F = -bv\\) έχει το αρνητικό πρόσημο για να δείξει ότι ανθίσταται στην κίνηση (αντίθετη φορά από το v)." },

          options: ["α. Hz", "β. rad/s", "γ. s", "δ. N/m"],

    const tfQuestions = [

    // Render όλων των ερωτήσεων
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        if (!container) return;
        let html = '';

        html += `<div class="section-title">🔹 Ερωτήσεις Πολλαπλής Επιλογής (1-25)</div>`;
        mcQuestions.forEach(q => {
            html += buildMCQuestionCard(q);
        });

        html += `<div class="section-title">🔸 Ερωτήσεις Σωστού - Λάθους (26-55)</div>`;
        tfQuestions.forEach(q => {
            html += buildTFQuestionCard(q);
        });

        container.innerHTML = html;
    }

    function buildMCQuestionCard(q) {
        const optionLetters = ['α', 'β', 'γ', 'δ'];
        let optionsHtml = `<div class="options">`;
        q.options.forEach((opt, idx) => {
            const letter = optionLetters[idx];
            optionsHtml += `
                <div class="option">
                    <input type="radio" name="mc_${q.id}" value="${letter}" id="mc_${q.id}_${letter}">
                    <label for="mc_${q.id}_${letter}">${escapeHtml(opt)}</label>
                </div>`;
        });
        optionsHtml += `</div>`;
        return `
            <div class="question-card" data-qid="mc_${q.id}" data-correct="${q.correct}" data-justification="${escapeHtml(q.justification)}" data-type="mc">
                <div class="badge">Ερώτηση ${q.id}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                ${optionsHtml}
                <button class="check-btn" data-qid="mc_${q.id}">✓ Έλεγχος απάντησης</button>
                <div class="feedback" id="feedback_mc_${q.id}" style="display: none;"></div>
            </div>
        `;
    }

    function buildTFQuestionCard(q) {
        return `
            <div class="question-card" data-qid="tf_${q.id}" data-correct="${q.correct}" data-justification="${escapeHtml(q.justification)}" data-type="tf">
                <div class="badge">Ερώτηση ${q.id}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options">
                    <div class="option"><input type="radio" name="tf_${q.id}" value="Σωστό" id="tf_${q.id}_true"><label for="tf_${q.id}_true">Σωστό</label></div>
                    <div class="option"><input type="radio" name="tf_${q.id}" value="Λάθος" id="tf_${q.id}_false"><label for="tf_${q.id}_false">Λάθος</label></div>
                </div>
                <button class="check-btn" data-qid="tf_${q.id}">✓ Έλεγχος απάντησης</button>
                <div class="feedback" id="feedback_tf_${q.id}" style="display: none;"></div>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event delegation για έλεγχο απαντήσεων
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.check-btn');
        if (!btn) return;
        const qidAttr = btn.getAttribute('data-qid');
        if (!qidAttr) return;
        const card = btn.closest('.question-card');
        if (!card) return;
        const correctAnswer = card.getAttribute('data-correct');
        const justificationRaw = card.getAttribute('data-justification');
        const type = card.getAttribute('data-type');
        let selectedValue = null;
        if (type === 'mc') {
            const selectedRadio = card.querySelector(`input[name="${qidAttr}"]:checked`);
            if (selectedRadio) selectedValue = selectedRadio.value;
        } else if (type === 'tf') {
            const selectedRadio = card.querySelector(`input[name="${qidAttr}"]:checked`);
            if (selectedRadio) selectedValue = selectedRadio.value;
        }
        const feedbackDiv = card.querySelector(`.feedback`);
        if (!feedbackDiv) return;

        if (!selectedValue) {
            feedbackDiv.style.display = 'block';
            feedbackDiv.innerHTML = `<span style="color:#f4a261;">⚠️ Παρακαλώ επιλέξτε μια απάντηση πρώτα.</span>`;
            feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
            return;
        }

        const isCorrect = (selectedValue === correctAnswer);
        feedbackDiv.style.display = 'block';
        feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
        if (isCorrect) {
            feedbackDiv.classList.add('correct-feedback');
            feedbackDiv.innerHTML = `<strong>✅ Σωστή απάντηση!</strong><div class="justification">📘 Δικαιολόγηση: ${justificationRaw}</div>`;
        } else {
            feedbackDiv.classList.add('wrong-feedback');
            feedbackDiv.innerHTML = `<strong>❌ Λανθασμένη απάντηση.</strong><div class="justification">📘 Σωστή απάντηση: <strong>${correctAnswer}</strong><br>Αιτιολόγηση: ${justificationRaw}</div>`;
        }
        if (window.MathJax) {
            MathJax.typesetPromise([feedbackDiv]).catch(err => console.log(err));
        }
    });

    renderQuestions();
    if (window.MathJax) {
        MathJax.typesetPromise();
    }
</script>
