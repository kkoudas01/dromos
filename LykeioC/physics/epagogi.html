<script>
    // --------------------------------------------------------------
    // Ερωτήσεις Πολλαπλής Επιλογής (1-35) – ακριβές κείμενο από PDF
    // --------------------------------------------------------------
    const mcQuestions = [
        { id: 1, text: "Σύμφωνα με το νόμο του Faraday, η επαγωγική ΗΕΔ σε ένα κύκλωμα είναι ανάλογη:", options: ["α. Της μαγνητικής ροής που το διαπερνά.", "β. Της ταχύτητας μεταβολής της μαγνητικής ροής.", "γ. Της έντασης του μαγνητικού πεδίου.", "δ. Της αντίστασης του κυκλώματος."], correct: "β", justification: "\\(E_{\\text{επ}} = -N \\frac{\\Delta\\Phi}{\\Delta t}\\). Η ΗΕΔ καθορίζεται από τον ρυθμό μεταβολής της ροής." },
        { id: 2, text: "Η μονάδα μέτρησης της μαγνητικής ροής στο S.I. είναι το:", options: ["α. Tesla (T)", "β. Weber (Wb)", "γ. Henry (H)", "δ. Volt (V)"], correct: "β", justification: "Η μαγνητική ροή μετριέται σε Weber (\\(1\\,\\text{Wb} = 1\\,\\text{T} \\cdot \\text{m}^2\\))." },
        { id: 3, text: "Ο κανόνας του Lenz επιτρέπει τον προσδιορισμό:", options: ["α. Του μέτρου της επαγωγικής ΗΕΔ.", "β. Της φοράς του επαγωγικού ρεύματος.", "γ. Της ωμικής αντίστασης.", "δ. Του συντελεστή αυτεπαγωγής."], correct: "β", justification: "Ο κανόνας του Lenz ορίζει ότι το επαγωγικό ρεύμα έχει τέτοια φορά ώστε να αντιτίθεται στην αιτία που το προκαλεί." },
        { id: 4, text: "Αν ένας ευθύγραμμος αγωγός κινείται παράλληλα στις δυναμικές γραμμές ομογενούς μαγνητικού πεδίου:", options: ["α. Η ΗΕΔ στα άκρα του είναι μέγιστη.", "β. Η ΗΕΔ στα άκρα του είναι μηδέν.", "γ. Δημιουργείται επαγωγικό ρεύμα.", "δ. Η ταχύτητά του αυξάνεται λόγω επαγωγής."], correct: "β", justification: "Ο αγωγός διαγράφει επιφάνεια που δεν «κόβει» δυναμικές γραμμές (θ = 90° μεταξύ της επιφάνειας που διαγράφει και της έντασης Β), άρα Φ = σταθερή = 0, ΔΦ = 0 και Εεπ = 0." },
        { id: 5, text: "Το συνολικό ηλεκτρικό φορτίο που μετακινείται σε ένα κύκλωμα λόγω επαγωγής \\(q = -N \\frac{\\Delta\\Phi}{R}\\):", options: ["α. Εξαρτάται από το πόσο γρήγορα μεταβλήθηκε η ροή.", "β. Είναι ανεξάρτητο από το χρόνο μεταβολής της ροής.", "γ. Είναι ανάλογο της ισχύος του ρεύματος.", "δ. Εξαρτάται από την επιτάχυνση του αγωγού."], correct: "β", justification: "Από τον τύπο φαίνεται ότι το q εξαρτάται μόνο από τη συνολική μεταβολή της ροής και την αντίσταση R." },
        { id: 6, text: "Μια ράβδος μήκους L κινείται σε επίπεδο κάθετο σε πεδίο Β με ταχύτητα ν κάθετη προς αυτή. Η ΗΕΔ στα άκρα της είναι Ε. Αν διπλασιάσουμε το L και το ν, η νέα ΗΕΔ θα είναι:", options: ["α. 2E", "β. 4E", "γ. E/2", "δ. E/4"], correct: "β", justification: "\\(E_{\\text{επ}} = B L v\\). Με διπλασιασμό και των δύο, έχουμε \\(B(2L)(2v) = 4BLv = 4E\\)." },
        { id: 7, text: "Ο κανόνας του Lenz είναι συνέπεια της αρχής:", options: ["α. Διατήρησης του φορτίου.", "β. Διατήρησης της ενέργειας.", "γ. Διατήρησης της ορμής.", "δ. Επαλληλίας των πεδίων."], correct: "β", justification: "Εξασφαλίζει ότι η ηλεκτρική ενέργεια που παράγεται προέρχεται από την κατανάλωση μηχανικής ενέργειας (έργο εξωτερικής δύναμης)." },
        { id: 8, text: "Σε ένα πηνίο που διαρρέεται από εναλλασσόμενο ρεύμα, η αυτεπαγωγή εμφανίζεται:", options: ["α. Μόνο όταν το ρεύμα είναι μέγιστο.", "β. Μόνο όταν το ρεύμα είναι μηδέν.", "γ. Κάθε στιγμή που μεταβάλλεται η ένταση του ρεύματος.", "δ. Μόνο αν η μαγνητική ροή είναι μηδέν."], correct: "γ", justification: "Η ΗΕΔ από αυτεπαγωγή είναι \\(E_{\\text{αυτ}} = -L \\frac{di}{dt}\\), άρα απαιτείται μεταβολή της έντασης." },
        { id: 9, text: "Η ενέργεια που αποθηκεύεται στο μαγνητικό πεδίο ενός πηνίου (L) όταν διαρρέεται από ρεύμα Ι είναι:", options: ["α. \\(LI^2\\)", "β. \\(\\frac{1}{2}LI^2\\)", "γ. \\(\\frac{1}{2}LI\\)", "δ. \\(L^2I\\)"], correct: "β", justification: "Πρόκειται για τη βασική σχέση ενέργειας μαγνητικού πεδίου." },
        { id: 10, text: "Η ενεργός τιμή της έντασης (I_{εν}) ενός ημιτονοειδούς εναλλασσόμενου ρεύματος πλάτους I:", options: ["α. Είναι ίση με Ι.", "β. Είναι ίση με \\(I/\\sqrt{2}\\).", "γ. Είναι ίση με \\(I \\cdot \\sqrt{2}\\).", "δ. Είναι η μέση τιμή της έντασης."], correct: "β", justification: "Ορίζεται ως η ένταση συνεχούς ρεύματος που προκαλεί το ίδιο θερμικό αποτέλεσμα με το εναλλασσόμενο στο ίδιο χρονικό διάστημα και στον ίδιο αντιστάτη." },
        { id: 11, text: "Μια ράβδος στρέφεται γύρω από το άκρο της σε ομογενές πεδίο Β. Η ΗΕΔ στα άκρα της είναι ανάλογη:", options: ["α. Μόνο της γωνιακής ταχύτητας ω.", "β. Μόνο του τετραγώνου του μήκους της \\(\\ell^2\\).", "γ. Μόνο της έντασης του πεδίου Β.", "δ. Όλων των παραπάνω."], correct: "δ", justification: "\\(E_{\\text{επ}} = \\frac{1}{2}B\\omega \\ell^2\\)." },
        { id: 12, text: "Σε έναν αντιστάτη R που τροφοδοτείται με εναλλασσόμενη τάση \\(v = V\\text{ημ}(\\omega t)\\):", options: ["α. Η ένταση προηγείται της τάσης.", "β. Η τάση και η ένταση είναι σε φάση.", "γ. Η τάση προηγείται της έντασης κατά π/2.", "δ. Η διαφορά φάσης εξαρτάται από τη συχνότητα."], correct: "β", justification: "Στον αντιστάτη ισχύει \\(i = v/R\\), άρα η ένταση ακολουθεί την τάση χωρίς καθυστέρηση." },
        { id: 13, text: "Ο συντελεστής αυτεπαγωγής L ενός πηνίου εξαρτάται από:", options: ["α. Την ένταση του ρεύματος.", "β. Την τάση της πηγής.", "γ. Τα γεωμετρικά χαρακτηριστικά του πηνίου.", "δ. Το χρόνο κατά τον οποίο διαρρέεται από ρεύμα."], correct: "γ", justification: "Το L καθορίζεται από τον αριθμό των σπειρών, το μήκος, το εμβαδόν και το υλικό του πυρήνα." },
        { id: 14, text: "Η μέση ισχύς σε έναν αντιστάτη R στο εναλλασσόμενο ρεύμα δίνεται από τη σχέση:", options: ["α. \\(P_{\\text{μέση}} = VI\\)", "β. \\(P_{\\text{μέση}} = V_{\\text{εν}}I_{\\text{εν}}/2\\)", "γ. \\(P_{\\text{μέση}} = VI/\\sqrt{2}\\)", "δ. \\(P_{\\text{μέση}} = VI/2\\)"], correct: "δ", justification: "\\(P = V_{\\text{εν}} I_{\\text{εν}} = (V/\\sqrt{2})(I/\\sqrt{2}) = VI/2\\)." },
        { id: 15, text: "Ένας αγώγιμος δακτύλιος πέφτει κατακόρυφα με το επίπεδό του οριζόντιο, πάνω από έναν κατακόρυφο μαγνήτη που έχει το βόρειο πόλο του προς τα πάνω. Ο φορέας της ταχύτητάς του διέρχεται από το κέντρο του δακτυλίου. Καθώς ο δακτύλιος πλησιάζει το μαγνήτη:", options: ["α. Έλκεται από αυτόν.", "β. Απωθείται από αυτόν.", "γ. Δεν δέχεται καμία δύναμη.", "δ. Στρέφεται γύρω από την κατακόρυφο."], correct: "β", justification: "Σύμφωνα με τον Lenz, ο δακτύλιος θα δημιουργήσει βόρειο πόλο στο κάτω μέρος του για να αντισταθεί στην αύξηση της ροής, άρα θα απωθηθεί." },
        { id: 16, text: "Η ΗΕΔ από αυτεπαγωγή σε ένα πηνίο είναι μέγιστη όταν:", options: ["α. Το ρεύμα στο κύκλωμα είναι μέγιστο και σταθερό.", "β. Ο ρυθμός μεταβολής της έντασης του ρεύματος είναι μέγιστος.", "γ. Το ρεύμα μηδενίζεται.", "δ. Ο συντελεστής αυτεπαγωγής είναι μηδέν."], correct: "β", justification: "\\(E_{\\text{αυτ}} = -L \\frac{di}{dt}\\), άρα είναι ανάλογη του ρυθμού μεταβολής της έντασης." },
        { id: 17, text: "Η συχνότητα του εναλλασσόμενου ρεύματος στην Ελλάδα είναι 50 Hz. Αυτό σημαίνει ότι η γωνιακή συχνότητα ω είναι:", options: ["α. 50 rad/s", "β. 50π rad/s", "γ. 10π rad/s", "δ. 314 rad/s."], correct: "δ", justification: "\\(\\omega = 2\\pi f = 2 \\cdot 3,14 \\cdot 50 = 314\\,\\text{rad/s}\\)." },
        { id: 18, text: "Η ηλεκτρική ενέργεια που μετατρέπεται σε θερμότητα σε έναν αντιστάτη R σε χρόνο μιας περιόδου Τ στο εναλλασσόμενο ρεύμα είναι:", options: ["α. \\(Q = I^2 R T\\)", "β. \\(Q = V_{\\text{EV}} I T\\)", "γ. \\(Q = V_{\\text{EV}} I_{\\text{E}} T/2\\)", "δ. \\(Q = P_{\\text{μέση}} T\\)"], correct: "δ", justification: "Είναι ο νόμος του Joule προσαρμοσμένος στις ενεργές τιμές." },
        { id: 19, text: "Ένα πηνίο με L = 0,2 Η διαρρέεται από ρεύμα I = 10 Α. Αν το ρεύμα μηδενιστεί σε 0,1 s , η μέση ΗΕΔ από αυτεπαγωγή είναι:", options: ["α. 2 V", "β. 20 V", "γ. 200 V", "δ. 0,2 V"], correct: "β", justification: "\\(E = L \\frac{\\Delta I}{\\Delta t} = 0,2 \\cdot (10/0,1) = 20\\,\\text{V}\\)." },
        { id: 20, text: "Σε μια γεννήτρια εναλλασσόμενης τάσης, η ΗΕΔ μηδενίζεται τη στιγμή που το επίπεδο του πλαισίου είναι:", options: ["α. Παράλληλο στις δυναμικές γραμμές.", "β. Κάθετο στις δυναμικές γραμμές.", "γ. Σε γωνία 45°.", "δ. Ποτέ δεν μηδενίζεται."], correct: "β", justification: "Όταν το πλαίσιο είναι κάθετο, η ροή είναι μέγιστη αλλά ο ρυθμός μεταβολής της (ΔΦ/Δt) είναι στιγμιαία μηδέν." },
        { id: 21, text: "Οι ονομαστικές τιμές των ηλεκτρικών συσκευών (π.χ. 220 V) αναφέρονται:", options: ["α. Στο πλάτος της τάσης.", "β. Στην ενεργό τιμή της τάσης.", "γ. Στη μέση τιμή της τάσης.", "δ. Στη στιγμιαία τιμή."], correct: "β", justification: "Οι ονομαστικές τάσεις των συσκευών και οι ενδείξεις των οργάνων είναι πάντα ενεργές τιμές." },
        { id: 22, text: "Μεταξύ πηνίων με τις ίδιες διαστάσεις αλλά με διαφορετικό αριθμό σπειρών Ν, ο συντελεστής αυτεπαγωγής L:", options: ["α. Είναι ανάλογος του αριθμού των σπειρών του, Ν.", "β. Είναι ανάλογος του \\(N^2\\).", "γ. Παραμένει ο ίδιος.", "δ. Μειώνεται όσο ο αριθμός Ν γίνεται μεγαλύτερος."], correct: "β", justification: "\\(L = \\frac{\\mu_0 N^2 A}{\\ell}\\), άρα το L είναι ανάλογο του τετραγώνου των σπειρών." },
        { id: 23, text: "Ένας αγωγός μήκους L κινείται σε μαγνητικό πεδίο μέτρου έντασης B με ταχύτητα v, έτσι ώστε B, v, L ανά δύο κάθετα. Αν η ταχύτητα γίνει 2v και το πεδίο B/2, η ΗΕΔ θα:", options: ["α. Διπλασιαστεί.", "β. Υποδιπλασιαστεί.", "γ. Παραμείνει η ίδια.", "δ. Τετραπλασιαστεί."], correct: "γ", justification: "\\(E = B L v\\). Η νέα ΗΕΔ είναι \\((B/2) L (2v) = B L v = E\\)." },
        { id: 24, text: "Η στιγμιαία ισχύς στο εναλλασσόμενο ρεύμα έχει συχνότητα:", options: ["α. Ίση με τη συχνότητα της τάσης.", "β. Διπλάσια από τη συχνότητα της τάσης.", "γ. Μηδενική (είναι σταθερή).", "δ. Υποδιπλάσια."], correct: "β", justification: "Λόγω του όρου \\(\\text{ημ}^2(\\omega t)\\), η ισχύς κάνει δύο πλήρεις μεταβολές σε μία περίοδο της τάσης." },
        { id: 25, text: "Όταν ο διακόπτης σε κύκλωμα με πηνίο ανοίγει, ο σπινθήρας που παρατηρείται οφείλεται:", options: ["α. Στην υψηλή τάση της πηγής.", "β. Στην ΗΕΔ από αυτεπαγωγή που τείνει να διατηρήσει το ρεύμα.", "γ. Στην ωμική αντίσταση των καλωδίων.", "δ. Στο υλικό του σύρματος του πηνίου."], correct: "β", justification: "Η απότομη μείωση του ρεύματος προκαλεί υψηλή επαγωγική τάση που δημιουργεί ισχυρό ηλεκτρικό πεδίο, σπάζει το μονωτικό του αέρα και υπερπηδά το διάκενο του διακόπτη δημιουργώντας ηλεκτρική εκκένωση." },
        { id: 26, text: "Η σχέση \\(V = N B A \\omega\\) δίνει:", options: ["α. Τη στιγμιαία τάση γεννήτριας.", "β. Το πλάτος της εναλλασσόμενης τάσης.", "γ. Την ενεργό τάση.", "δ. Τη μέση τάση."], correct: "β", justification: "Πρόκειται για τη μέγιστη τιμή που παίρνει η ημιτονοειδής τάση." },

        { id: 28, text: "Κατά την κύλιση (χωρίς ολίσθηση) ενός αγώγιμου τροχού σε οριζόντιο έδαφος μέσα σε οριζόντιο μαγνητικό πεδίο μέτρου έντασης Β κάθετου στο επίπεδο περιστροφής, η ΗΕΔ ανάμεσα στο κέντρο και το σημείο επαφής είναι:", options: ["α. Μηδέν.", "β. \\(\\frac{1}{2}B\\omega R^2\\).", "γ. \\(B\\omega R^2\\).", "δ. \\(2B\\omega R^2\\)."], correct: "β", justification: "Μπορούμε να θεωρήσουμε ως ράβδο μια ακτίνα που στρέφεται γύρω από το σημείο επαφής." },

    // Render όλων των ερωτήσεων
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        if (!container) return;
        let html = '';

        html += `<div class="section-title">🔹 Ερωτήσεις Πολλαπλής Επιλογής (1-35)</div>`;
        mcQuestions.forEach(q => {
            html += buildMCQuestionCard(q);
        });

        html += `<div class="section-title">🔸 Ερωτήσεις Σωστού - Λάθους (36-71)</div>`;
        tfQuestions.forEach(q => {
            html += buildTFQuestionCard(q);
        });

        container.innerHTML = html;
    }

    function buildMCQuestionCard(q) {
        const optionLetters = ['α', 'β', 'γ', 'δ'];
        let optionsHtml = `<div class="options">`;
        q.options.forEach((opt, idx) => {
            const letter = optionLetters[idx];
            optionsHtml += `
                <div class="option">
                    <input type="radio" name="mc_${q.id}" value="${letter}" id="mc_${q.id}_${letter}">
                    <label for="mc_${q.id}_${letter}">${escapeHtml(opt)}</label>
                </div>`;
        });
        optionsHtml += `</div>`;
        return `
            <div class="question-card" data-qid="mc_${q.id}" data-correct="${q.correct}" data-justification="${escapeHtml(q.justification)}" data-type="mc">
                <div class="badge">Ερώτηση ${q.id}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                ${optionsHtml}
                <button class="check-btn" data-qid="mc_${q.id}">✓ Έλεγχος απάντησης</button>
                <div class="feedback" id="feedback_mc_${q.id}" style="display: none;"></div>
            </div>
        `;
    }

    function buildTFQuestionCard(q) {
        return `
            <div class="question-card" data-qid="tf_${q.id}" data-correct="${q.correct}" data-justification="${escapeHtml(q.justification)}" data-type="tf">
                <div class="badge">Ερώτηση ${q.id}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options">
                    <div class="option"><input type="radio" name="tf_${q.id}" value="Σωστό" id="tf_${q.id}_true"><label for="tf_${q.id}_true">Σωστό</label></div>
                    <div class="option"><input type="radio" name="tf_${q.id}" value="Λάθος" id="tf_${q.id}_false"><label for="tf_${q.id}_false">Λάθος</label></div>
                </div>
                <button class="check-btn" data-qid="tf_${q.id}">✓ Έλεγχος απάντησης</button>
                <div class="feedback" id="feedback_tf_${q.id}" style="display: none;"></div>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event delegation για έλεγχο απαντήσεων
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.check-btn');
        if (!btn) return;
        const qidAttr = btn.getAttribute('data-qid');
        if (!qidAttr) return;
        const card = btn.closest('.question-card');
        if (!card) return;
        const correctAnswer = card.getAttribute('data-correct');
        const justificationRaw = card.getAttribute('data-justification');
        const type = card.getAttribute('data-type');
        let selectedValue = null;
        if (type === 'mc') {
            const selectedRadio = card.querySelector(`input[name="${qidAttr}"]:checked`);
            if (selectedRadio) selectedValue = selectedRadio.value;
        } else if (type === 'tf') {
            const selectedRadio = card.querySelector(`input[name="${qidAttr}"]:checked`);
            if (selectedRadio) selectedValue = selectedRadio.value;
        }
        const feedbackDiv = card.querySelector(`.feedback`);
        if (!feedbackDiv) return;

        if (!selectedValue) {
            feedbackDiv.style.display = 'block';
            feedbackDiv.innerHTML = `<span style="color:#f4a261;">⚠️ Παρακαλώ επιλέξτε μια απάντηση πρώτα.</span>`;
            feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
            return;
        }

        const isCorrect = (selectedValue === correctAnswer);
        feedbackDiv.style.display = 'block';
        feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
        if (isCorrect) {
            feedbackDiv.classList.add('correct-feedback');
            feedbackDiv.innerHTML = `<strong>✅ Σωστή απάντηση!</strong><div class="justification">📘 Δικαιολόγηση: ${justificationRaw}</div>`;
        } else {
            feedbackDiv.classList.add('wrong-feedback');
            feedbackDiv.innerHTML = `<strong>❌ Λανθασμένη απάντηση.</strong><div class="justification">📘 Σωστή απάντηση: <strong>${correctAnswer}</strong><br>Αιτιολόγηση: ${justificationRaw}</div>`;
        }
        if (window.MathJax) {
            MathJax.typesetPromise([feedbackDiv]).catch(err => console.log(err));
        }
    });

    renderQuestions();
    if (window.MathJax) {
        MathJax.typesetPromise();
    }
</script>
</body>
</html>
