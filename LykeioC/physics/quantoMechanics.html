<script>
    // --------------------------------------------------------------
    // Ερωτήσεις Πολλαπλής Επιλογής (1-47) – ακριβές κείμενο από PDF
    // --------------------------------------------------------------
    const mcQuestions = [
        { id: 1, text: "Σύμφωνα με την υπόθεση του Planck, η ενέργεια ενός ταλαντούμενου ατόμου συχνότητας f:", options: ["α. Μπορεί να πάρει οποιαδήποτε τιμή.", "β. Είναι πάντα ίση με τη σταθερά h.", "γ. Είναι κβαντισμένη και δίνεται από τη σχέση E = nhf (n = 1,2,3. ..).", "δ. Εξαρτάται μόνο από τη θερμοκρασία."], correct: "γ", justification: "Ο Planck υπέθεσε ότι η ενέργεια των ταλαντούμενων ατόμων δεν είναι μέγεθος που παίρνει συνεχείς τιμές, αλλά ανταλλάσσεται σε πακέτα (κβάντα)." },
        { id: 2, text: "Η σταθερά του Planck h εκφράζεται στο S.I. σε:", options: ["α. J/s", "β. J·s", "γ. W·s", "δ. N/m"], correct: "β", justification: "Προκύπτει από τη σχέση \\(E = hf\\), όπου \\(h = E/f\\) (J/Hz = J·s)." },
        { id: 3, text: "Το μέλαν σώμα χαρακτηρίζεται από το γεγονός ότι:", options: ["α. Ανακλά όλη την ηλεκτρομαγνητική ακτινοβολία που προσπίπτει πάνω του.", "β. Απορροφά όλη την ηλεκτρομαγνητική ακτινοβολία που προσπίπτει πάνω του.", "γ. Εκπέμπει μόνο υπεριώδη ακτινοβολία.", "δ. Φαίνεται μαύρο όταν προσπίπτει πάνω του ορατό φως οποιουδήποτε μήκους κύματος."], correct: "β", justification: "Ορισμός." },
        { id: 4, text: "Στο φωτοηλεκτρικό φαινόμενο, η εκπομπή ηλεκτρονίων συμβαίνει μόνο αν η συχνότητα f:", options: ["α. Είναι μικρότερη από τη συχνότητα κατωφλίου f0.", "β. Είναι μεγαλύτερη ή ίση από τη συχνότητα κατωφλίου f0.", "γ. Είναι ίση με την ταχύτητα του φωτός.", "δ. Είναι ανεξάρτητη από το υλικό."], correct: "β", justification: "Απαιτείται ελάχιστη ενέργεια \\(hf \\ge \\phi\\), όπου \\(\\phi = hf_0\\)." },
        { id: 5, text: "Η φωτοηλεκτρική εξίσωση του Einstein είναι:", options: ["α. \\(K_{\\max} = hf + \\phi\\)", "β. \\(K_{\\max} = hf - \\phi\\)", "γ. \\(K_{\\max} = \\phi - hf\\)", "δ. \\(K_{\\max} = h/\\lambda\\)"], correct: "β", justification: "Η ενέργεια του φωτονίου (hf) δαπανάται για την έξοδο από το μέταλλο (φ) και το περίσσευμα γίνεται κινητική ενέργεια." },
        { id: 6, text: "Το έργο εξαγωγής φ εξαρτάται από:", options: ["α. Τη συχνότητα του φωτός.", "β. Την ένταση της δέσμης.", "γ. Τη φύση του μετάλλου.", "δ. Τον χρόνο έκθεσης."], correct: "γ", justification: "Είναι χαρακτηριστική σταθερά κάθε υλικού." },
        { id: 7, text: "Η ορμή p ενός φωτονίου μήκους κύματος λ είναι:", options: ["α. \\(p = h\\lambda\\)", "β. \\(p = h/\\lambda\\)", "γ. \\(p = \\lambda/h\\)", "δ. \\(p = mc\\)"], correct: "β", justification: "Προκύπτει από τις σχέσεις \\(E = hf\\) και \\(E = pc\\)." },
        { id: 8, text: "Στο φαινόμενο Compton, η μεταβολή Δλ εξαρτάται από:", options: ["α. Το υλικό του στόχου.", "β. Τη γωνία σκέδασης φ.", "γ. Την ένταση των ακτίνων Χ.", "δ. Την ταχύτητα του φωτός."], correct: "β", justification: "Η σχέση \\(\\Delta\\lambda = \\frac{h}{mc}(1 - \\text{συν}\\phi)\\) περιλαμβάνει μόνο τη γωνία φ." },
        { id: 9, text: "Κατά τη σκέδαση Compton, το σκεδαζόμενο φωτόνιο έχει:", options: ["α. Μεγαλύτερη ενέργεια.", "β. Μεγαλύτερο μήκος κύματος.", "γ. Μεγαλύτερη συχνότητα.", "δ. Μεγαλύτερη ορμή."], correct: "β", justification: "Χάνει ενέργεια προς το ηλεκτρόνιο, άρα η συχνότητά του μειώνεται και το λ αυξάνεται." },
        { id: 10, text: "Σύμφωνα με τον de Broglie, ένα σωματίδιο ορμής p έχει μήκος κύματος:", options: ["α. \\(\\lambda = p/h\\)", "β. \\(\\lambda = h/p\\)", "γ. \\(\\lambda = h \\cdot p\\)", "δ. \\(\\lambda = c/f\\)"], correct: "β", justification: "Είναι η θεμελιώδης σχέση της κυματικής φύσης της ύλης." },
        { id: 11, text: "Η αρχή της αβεβαιότητας (Heisenberg) για τη θέση x και την ορμή p_x είναι:", options: ["α. \\(\\Delta x \\cdot \\Delta p_x \\ge 0\\)", "β. \\(\\Delta x \\cdot \\Delta p_x \\ge h/2\\pi\\)", "γ. \\(\\Delta x = \\Delta p_x\\)", "δ. \\(\\Delta x \\cdot \\Delta p_x \\le h\\)"], correct: "β", justification: "Ορίζει τον εγγενή περιορισμό στην ακρίβεια ταυτόχρονης μέτρησης." },
        { id: 12, text: "Σε ένα πείραμα φωτοηλεκτρικού φαινομένου, αν διατηρήσουμε σταθερή τη συχνότητα της ακτινοβολίας (f > f0) και διπλασιάσουμε την ένταση της δέσμης (τον αριθμό των φωτονίων ανά δευτερόλεπτο), η τάση αποκοπής V0:", options: ["α. Διπλασιάζεται.", "β. Υποδιπλασιάζεται.", "γ. Παραμένει σταθερή.", "δ. Μειώνεται ελάχιστα."], correct: "γ", justification: "Η τάση αποκοπής V0 συνδέεται με τη μέγιστη κινητική ενέργεια των ηλεκτρονίων (e V0 = Kmax), η οποία εξαρτάται μόνο από τη συχνότητα του φωτός και το υλικό, όχι από την ένταση της δέσμης." },
        { id: 13, text: "Η τάση αποκοπής V0 στο φωτοηλεκτρικό φαινόμενο:", options: ["α. Αυξάνεται με την ένταση του φωτός.", "β. Είναι η τάση που σταματά τα ταχύτερα ηλεκτρόνια.", "γ. Είναι ανεξάρτητη από τη συχνότητα.", "δ. Είναι πάντα μηδέν."], correct: "β", justification: "Ισχύει \\(e V_0 = K_{\\max}\\)." },
        { id: 14, text: "Ποιο σωματίδιο με την ίδια ταχύτητα υ έχει το μικρότερο μήκος κύματος de Broglie;", options: ["α. Ηλεκτρόνιο.", "β. Πρωτόνιο.", "γ. Νετρόνιο.", "δ. Κόκκος άμμου."], correct: "δ", justification: "Επειδή \\(\\lambda = h/mv\\), η μεγαλύτερη μάζα δίνει το μικρότερο λ." },
        { id: 15, text: "Η παραγωγή ακτίνων Χ μπορεί να θεωρηθεί:", options: ["α. Φαινόμενο Compton.", "β. Αντίστροφο φωτοηλεκτρικό φαινόμενο.", "γ. Σκέδαση πρωτονίων.", "δ. Απορρόφηση ακτίνων γ από μέλαν σώμα."], correct: "β", justification: "Κινητική ενέργεια ηλεκτρονίων μετατρέπεται σε ακτινοβολία." },
        { id: 16, text: "Η αβεβαιότητα στην ενέργεια ΔΕ και ο χρόνος ζωής Δt συνδέονται ως:", options: ["α. \\(\\Delta E \\cdot \\Delta t \\ge h/2\\pi\\)", "β. \\(\\Delta E = h/\\Delta t\\)", "γ. \\(\\Delta E \\cdot \\Delta t = 0\\)", "δ. \\(\\Delta E = h \\cdot \\Delta t\\)"], correct: "α", justification: "Είναι αρχή της αβεβαιότητας για χρόνο παρατήρησης συστήματος και αβεβαιότητα στη μέτρηση της ενέργειας." },
        { id: 17, text: "Αν φωτόνιο και ηλεκτρόνιο έχουν το ίδιο λ:", options: ["α. Έχουν την ίδια ενέργεια.", "β. Έχουν την ίδια ορμή p.", "γ. Έχουν την ίδια μάζα.", "δ. Κινούνται με την ίδια ταχύτητα."], correct: "β", justification: "Και για τα δύο ισχύει \\(p = h/\\lambda\\)." },
        { id: 18, text: "Όταν η θερμοκρασία Τ ενός μέλανος σώματος αυξάνεται, το λmax (μήκος κύματος αιχμής):", options: ["α. Αυξάνεται.", "β. Μειώνεται.", "γ. Παραμένει σταθερό.", "δ. Μηδενίζεται."], correct: "β", justification: "Σύμφωνα με το νόμο του Wien, είναι αντιστρόφως ανάλογα." },
        { id: 19, text: "Το φαινόμενο Compton αποδεικνύει:", options: ["α. Την κυματική φύση του φωτός.", "β. Τη σωματιδιακή φύση της ακτινοβολίας.", "γ. Ότι τα ηλεκτρόνια είναι ακίνητα.", "δ. Την εξαγωγή φωτοηλεκτρονίων από μέταλλο."], correct: "β", justification: "Ερμηνεύεται ως κρούση σωματιδίων." },
        { id: 20, text: "Το 1eV είναι μονάδα μέτρησης:", options: ["α. Τάσης.", "β. Ενέργειας.", "γ. Φορτίου.", "δ. Ισχύος."], correct: "β", justification: "Αντιστοιχεί σε \\(W = e \\cdot 1\\,\\text{Volt} = 1,6 \\cdot 10^{-19}\\,\\text{J}\\)." },
        { id: 21, text: "Η αύξηση της έντασης της ακτινοβολίας στο φωτοηλεκτρικό φαινόμενο αυξάνει:", options: ["α. Την Kmax.", "β. Το φωτοηλεκτρικό μέγιστο ρεύμα (ρεύμα κόρου).", "γ. Την τάση αποκοπής.", "δ. Τη συχνότητα κατωφλίου."], correct: "β", justification: "Περισσότερα φωτόνια παράγουν περισσότερα ηλεκτρόνια." },
        { id: 22, text: "Η κυματική φύση της ύλης επιβεβαιώνεται από:", options: ["α. Την ευθύγραμμη κίνηση.", "β. Την περίθλαση ηλεκτρονίων (πειράματα Davison-Germer).", "γ. Τις ελαστικές κρούσεις.", "δ. Την πτώση των σωμάτων."], correct: "β", justification: "Η περίθλαση είναι αποκλειστικά κυματικό φαινόμενο." },
        { id: 23, text: "Η μάζα ηρεμίας του φωτονίου είναι:", options: ["α. Ίση με του ηλεκτρονίου.", "β. Άπειρη.", "γ. Μηδέν.", "δ. Μεταβλητή."], correct: "γ", justification: "Τα φωτόνια ταξιδεύουν πάντα με ταχύτητα c και έχουν \\(m_0 = 0\\)." },
        { id: 24, text: "Η αβεβαιότητα θέσης για μια μπάλα είναι:", options: ["α. Μεγάλη.", "β. Αμελητέα.", "γ. Ίση με το λ της κατά de Broglie.", "δ. Άπειρη."], correct: "β", justification: "Λόγω της μεγάλης μάζας, η αβεβαιότητα είναι πρακτικά μηδενική." },
        { id: 25, text: "Το \\(|\\Psi|^2\\) ονομάζεται:", options: ["α. Πυκνότητα πιθανότητας.", "β. Πυκνότητα μάζας.", "γ. Πυκνότητα ενέργειας.", "δ. Ένταση πεδίου."], correct: "α", justification: "Εκφράζει την πιθανότητα ανά μονάδα όγκου." },
        { id: 26, text: "Αν σε ένα φωτοκύτταρο χρησιμοποιήσουμε φως μεγαλύτερης συχνότητας (διατηρώντας το ίδιο μέταλλο στην κάθοδο), η τάση αποκοπής V0:", options: ["α. Θα αυξηθεί.", "β. Θα μειωθεί.", "γ. Θα παραμείνει η ίδια.", "δ. Θα μηδενιστεί."], correct: "α", justification: "Σύμφωνα με τη φωτοηλεκτρική εξίσωση του Einstein (\\(e V_0 = hf - \\phi\\)), η τάση αποκοπής είναι ανάλογη της συχνότητας f. Μεγαλύτερη συχνότητα σημαίνει ταχύτερα ηλεκτρόνια, άρα απαιτείται μεγαλύτερη αντίθετη τάση για να σταματήσουν." },
        { id: 27, text: "Το χρώμα με τη μεγαλύτερη ενέργεια ανά φωτόνιο είναι το:", options: ["α. Κόκκινο.", "β. Πράσινο.", "γ. Κίτρινο.", "δ. Μπλε."], correct: "δ", justification: "Έχει τη μεγαλύτερη συχνότητα από τα τέσσερα." },
        { id: 28, text: "Στο φαινόμενο Compton, για γωνία σκέδασης φ = 90°:", options: ["α. Δλ είναι μέγιστη.", "β. \\(\\Delta\\lambda = h/mc\\).", "γ. Το φωτόνιο απορροφάται.", "δ. Το ηλεκτρόνιο εξαφανίζεται."], correct: "β", justification: "Στον τύπο του Compton, ο όρος \\((1 - \\text{συν}90^\\circ) = 1\\)." },
        { id: 29, text: "Η κλασική φυσική προέβλεπε λανθασμένα ότι στο φωτοηλεκτρικό φαινόμενο, αν η ένταση της ακτινοβολίας ήταν πολύ μικρή:", options: ["α. Τα ηλεκτρόνια θα εκπέμπονταν με την ταχύτητα του φωτός.", "β. Θα χρειαζόταν ένα χρονικό διάστημα (καθυστέρηση) για να συσσωρευτεί η ενέργεια και να εκπεμφθούν τα ηλεκτρόνια.", "γ. Η εκπομπή θα ήταν πάντα ακαριαία.", "δ. Τα ηλεκτρόνια δεν θα εξάγονταν."], correct: "β", justification: "Κατά την κλασική θεώρηση του κύματος, η ενέργεια προσφέρεται συνεχώς στην επιφάνεια, οπότε μια ασθενής δέσμη θα έπρεπε να «βομβαρδίζει» το μέταλλο για αρκετό χρόνο μέχρι να απελευθερωθεί ένα ηλεκτρόνιο, κάτι που διαψεύδεται πειραματικά." },
        { id: 30, text: "Η συχνότητα κατωφλίου f0 ισούται με:", options: ["α. \\(\\phi/h\\)", "β. \\(h/\\phi\\)", "γ. \\(\\phi \\cdot h\\)", "δ. \\(c/\\lambda\\)"], correct: "α", justification: "Προκύπτει από τη σχέση \\(h f_0 = \\phi\\)." },
        { id: 31, text: "Η ενέργεια των μακροσκοπικών συστημάτων φαίνεται συνεχής διότι:", options: ["α. Δεν υπάρχει καθόλου κβάντωση της ενέργειας.", "β. Τα ενεργειακά άλματα είναι πολύ μικρά.", "γ. Τα συστήματα δεν ταλαντώνονται.", "δ. Η σταθερά h είναι άπειρη."], correct: "β", justification: "Οι μεταβολές της ενέργειας του συστήματος για πολύ μεγάλους κβαντικούς αριθμούς (μακρόκοσμος) είναι μη μετρήσιμες συγκρινόμενες με την ενέργεια του συστήματος." },
        { id: 32, text: "Το μήκος κύματος κατά de Broglie στο μακρόκοσμο είναι:", options: ["α. Μεγάλο και συγκρίσιμο με αυτό του ορατού φωτός", "β. Πολύ μικρό αλλά μπορούμε να το ανιχνεύσουμε", "γ. Μεγάλο και δε μπορούμε να το ανιχνεύσουμε", "δ. Πολύ μικρό και μάλλον δε θα μπορέσουμε να το ανιχνεύσουμε ποτέ"], correct: "δ", justification: "\\(\\lambda = h/p\\), είναι σε τάξη μεγέθους \\(10^{-34}\\) (όσο και η σταθερά Planck)." },
        { id: 33, text: "Αν η τάση επιτάχυνσης V ενός ηλεκτρονίου αυξηθεί, το λ του:", options: ["α. Αυξάνεται.", "β. Μειώνεται.", "γ. Μένει ίδιο.", "δ. Διπλασιάζεται."], correct: "β", justification: "Μεγαλύτερη τάση σημαίνει μεγαλύτερη ορμή, άρα μικρότερο λ." },

        { id: 84, text: "Σύμφωνα με την αρχή της αβεβαιότητας, αν γνωρίζουμε με απόλυτη ακρίβεια την ορμή ενός σωματιδίου (Δp = 0), τότε η θέση του είναι εντελώς απροσδιόριστη (Δx → ∞).", correct: "Σωστό", justification: "Η σχέση \\(\\Delta x \\cdot \\Delta p \\ge h/2\\pi\\) δείχνει ότι για δεδομένη αβεβαιότητα ορμής, η ελάχιστη αβεβαιότητα μέτρησης θέσης είναι μέγεθος αντιστρόφως ανάλογο προς την τελευταία. Ο πλήρης προσδιορισμός της μίας οδηγεί σε πλήρη άγνοια για την άλλη." },
        { id: 85, text: "Κατά τη σκέδαση Compton, είναι δυνατόν το ηλεκτρόνιο να ανακρουστεί σε διεύθυνση κάθετη προς την αρχική διεύθυνση κίνησης του προσπίπτοντος φωτονίου.", correct: "Λάθος", justification: "Τότε προκύπτει πως το σκεδαζόμενο φωτόνιο έχει μεγαλύτερη ορμή από το προσπίπτον (p' > p) άρα λ' > λ που είναι αδύνατο με βάση την εξίσωση Compton." }
    ];

    // Render όλων των ερωτήσεων
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        if (!container) return;
        let html = '';

        html += `<div class="section-title">🔹 Ερωτήσεις Πολλαπλής Επιλογής (1-47)</div>`;
        mcQuestions.forEach(q => {
            html += buildMCQuestionCard(q);
        });

        html += `<div class="section-title">🔸 Ερωτήσεις Σωστού - Λάθους (48-85)</div>`;
        tfQuestions.forEach(q => {
            html += buildTFQuestionCard(q);
        });

        container.innerHTML = html;
    }

    function buildMCQuestionCard(q) {
        const optionLetters = ['α', 'β', 'γ', 'δ'];
        let optionsHtml = `<div class="options">`;
        q.options.forEach((opt, idx) => {
            const letter = optionLetters[idx];
            optionsHtml += `
                <div class="option">
                    <input type="radio" name="mc_${q.id}" value="${letter}" id="mc_${q.id}_${letter}">
                    <label for="mc_${q.id}_${letter}">${escapeHtml(opt)}</label>
                </div>`;
        });
        optionsHtml += `</div>`;
        return `
            <div class="question-card" data-qid="mc_${q.id}" data-correct="${q.correct}" data-justification="${escapeHtml(q.justification)}" data-type="mc">
                <div class="badge">Ερώτηση ${q.id}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                ${optionsHtml}
                <button class="check-btn" data-qid="mc_${q.id}">✓ Έλεγχος απάντησης</button>
                <div class="feedback" id="feedback_mc_${q.id}" style="display: none;"></div>
            </div>
        `;
    }

    function buildTFQuestionCard(q) {
        return `
            <div class="question-card" data-qid="tf_${q.id}" data-correct="${q.correct}" data-justification="${escapeHtml(q.justification)}" data-type="tf">
                <div class="badge">Ερώτηση ${q.id}</div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options">
                    <div class="option"><input type="radio" name="tf_${q.id}" value="Σωστό" id="tf_${q.id}_true"><label for="tf_${q.id}_true">Σωστό</label></div>
                    <div class="option"><input type="radio" name="tf_${q.id}" value="Λάθος" id="tf_${q.id}_false"><label for="tf_${q.id}_false">Λάθος</label></div>
                </div>
                <button class="check-btn" data-qid="tf_${q.id}">✓ Έλεγχος απάντησης</button>
                <div class="feedback" id="feedback_tf_${q.id}" style="display: none;"></div>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event delegation για έλεγχο απαντήσεων
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.check-btn');
        if (!btn) return;
        const qidAttr = btn.getAttribute('data-qid');
        if (!qidAttr) return;
        const card = btn.closest('.question-card');
        if (!card) return;
        const correctAnswer = card.getAttribute('data-correct');
        const justificationRaw = card.getAttribute('data-justification');
        const type = card.getAttribute('data-type');
        let selectedValue = null;
        if (type === 'mc') {
            const selectedRadio = card.querySelector(`input[name="${qidAttr}"]:checked`);
            if (selectedRadio) selectedValue = selectedRadio.value;
        } else if (type === 'tf') {
            const selectedRadio = card.querySelector(`input[name="${qidAttr}"]:checked`);
            if (selectedRadio) selectedValue = selectedRadio.value;
        }
        const feedbackDiv = card.querySelector(`.feedback`);
        if (!feedbackDiv) return;

        if (!selectedValue) {
            feedbackDiv.style.display = 'block';
            feedbackDiv.innerHTML = `<span style="color:#f4a261;">⚠️ Παρακαλώ επιλέξτε μια απάντηση πρώτα.</span>`;
            feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
            return;
        }

        const isCorrect = (selectedValue === correctAnswer);
        feedbackDiv.style.display = 'block';
        feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
        if (isCorrect) {
            feedbackDiv.classList.add('correct-feedback');
            feedbackDiv.innerHTML = `<strong>✅ Σωστή απάντηση!</strong><div class="justification">📘 Δικαιολόγηση: ${justificationRaw}</div>`;
        } else {
            feedbackDiv.classList.add('wrong-feedback');
            feedbackDiv.innerHTML = `<strong>❌ Λανθασμένη απάντηση.</strong><div class="justification">📘 Σωστή απάντηση: <strong>${correctAnswer}</strong><br>Αιτιολόγηση: ${justificationRaw}</div>`;
        }
        if (window.MathJax) {
            MathJax.typesetPromise([feedbackDiv]).catch(err => console.log(err));
        }
    });

    renderQuestions();
    if (window.MathJax) {
        MathJax.typesetPromise();
    }
</script>
</body>
</html>
