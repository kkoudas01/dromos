<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πολικές Συντεταγμένες</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --cyan: #00d4d4;
            --red: #e74c3c;
            --red-faded: #e74c3c55;
            --green: #2ecc71;
            --green-faded: #2ecc7140;
            --white: #ffffff;
            --golden: #f0c060;
            --cardinal-red: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
        }

        .main-container {
            width: 100%;
            max-width: 750px;
            position: relative;
            background: var(--surface);
            border-radius: 18px;
            padding: 16px 14px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
        }

        .top-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-back {
            background: #333355;
            color: #ccc;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .btn-back:hover {
            background: #444477;
            color: #fff;
            border-color: #888;
        }
        .btn-back:active {
            transform: scale(0.95);
        }

        .btn-reset {
            background: #4a2030;
            color: #f0a0a0;
            border: 1px solid #8b3a4a;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.25s;
            white-space: nowrap;
            font-weight: 500;
        }
        .btn-reset:hover {
            background: #5e2a3e;
            color: #ffb0b0;
            border-color: #b05060;
        }
        .btn-reset:active {
            transform: scale(0.95);
        }

        .svg-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 65vh;
            background: #0d0d1a;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid #2a2a3e;
            position: relative;
            cursor: crosshair;
            touch-action: manipulation;
        }

        .svg-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .tabs-container {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 140px;
            padding: 12px 10px;
            border-radius: 10px 10px 0 0;
            border: 2px solid #3a3a55;
            background: #1e1e35;
            color: #aaa;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }
        .tab-btn:hover {
            background: #2a2a45;
            color: #ccc;
            border-color: #5a5a80;
        }
        .tab-btn.active {
            background: #0d2a2a;
            color: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 14px rgba(0, 212, 212, 0.25);
        }

        .tab-content {
            background: #111128;
            border: 2px solid #3a3a55;
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 16px 14px;
            min-height: 80px;
            transition: all 0.3s;
        }
        .tab-content.hidden {
            display: none;
        }

        .coord-display {
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 1.3rem;
            color: var(--cyan);
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.8;
            cursor: default;
            position: relative;
        }
        .coord-display .clickable-x {
            cursor: pointer;
            transition: all 0.2s;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .coord-display .clickable-x:hover {
            background: rgba(0, 212, 212, 0.2);
        }
        .coord-display .clickable-y {
            cursor: pointer;
            transition: all 0.2s;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .coord-display .clickable-y:hover {
            background: rgba(0, 212, 212, 0.2);
        }
        .coord-display .clickable-xy {
            cursor: pointer;
            transition: all 0.2s;
            padding: 2px 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .coord-display .clickable-xy:hover {
            background: rgba(0, 212, 212, 0.2);
        }

        @keyframes blink-fast {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.15;
            }
        }
        @keyframes blink-slow {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .blinking {
            animation: blink-fast 0.7s ease-in-out infinite;
        }
        .blinking-slow {
            animation: blink-slow 1.1s ease-in-out infinite;
        }

        @keyframes shimmer-border {
            0% {
                text-shadow: 0 0 0px #fff, 0 0 0px #0ff, 1px 0 0px #0ff, 0 0 0px #0ff;
            }
            25% {
                text-shadow: 0 0 4px #fff, 0 1px 6px #0ff, 0 0 2px #0ff, 0 -1px 4px #0ff;
            }
            50% {
                text-shadow: 0 0 0px #fff, 0 0 8px #0ff, -1px 0 4px #0ff, 0 0 2px #0ff;
            }
            75% {
                text-shadow: 0 0 4px #fff, 0 -1px 6px #0ff, 0 0 2px #0ff, 0 1px 4px #0ff;
            }
            100% {
                text-shadow: 0 0 0px #fff, 0 0 0px #0ff, 1px 0 0px #0ff, 0 0 0px #0ff;
            }
        }
        .shimmer-glow {
            animation: shimmer-border 1.5s ease-in-out infinite;
            color: #fff !important;
            font-weight: bold;
        }

        .sub-display {
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 1.1rem;
            color: #b0d0f0;
            text-align: center;
            margin-top: 6px;
            letter-spacing: 0.5px;
            line-height: 1.7;
        }
        .sub-display .highlight-val {
            color: #ffe080;
            font-weight: bold;
        }

        .triangle-btn {
            display: inline-block;
            margin: 8px auto 0;
            padding: 9px 18px;
            background: #2a2a40;
            color: #d0d0e0;
            border: 2px solid #5a5a7a;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            text-align: center;
        }
        .triangle-btn:hover {
            background: #3a3a55;
            border-color: #8888bb;
            color: #fff;
        }
        .triangle-btn:active {
            transform: scale(0.94);
        }
        .triangle-btn.active-tri {
            background: #3a2a20;
            border-color: #c09050;
            color: #ffe0c0;
        }

        .signature {
            text-align: right;
            font-size: 0.7rem;
            color: #555;
            margin-top: 12px;
            font-style: italic;
            letter-spacing: 0.4px;
            opacity: 0.7;
        }

        .btn-center {
            text-align: center;
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 10px 6px 14px;
                border-radius: 12px;
            }
            .tab-btn {
                font-size: 0.78rem;
                padding: 10px 6px;
                min-width: 110px;
            }
            .coord-display {
                font-size: 1.05rem;
            }
            .sub-display {
                font-size: 0.9rem;
            }
            .btn-back,
            .btn-reset {
                font-size: 0.75rem;
                padding: 6px 10px;
            }
            .svg-wrapper {
                max-height: 50vh;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <!-- Top buttons -->
        <div class="top-buttons">
            <a href="index.html" class="btn-back" title="Επιστροφή στην αρχική σελίδα">← Αρχική</a>
            <button class="btn-reset" id="btnReset" title="Ανανέωση – Επαναφορά όλων">⟳ Ανανέωση</button>
        </div>

        <!-- SVG Polar Coordinate System -->
        <div class="svg-wrapper" id="svgWrapper">
            <svg id="polarSvg" viewBox="-340 -340 680 680" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Red arrowhead marker -->
                    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
                        <polygon points="0,0 10,4 0,8" fill="#e74c3c" />
                    </marker>
                    <!-- White arrowhead marker (κανονικό για το διάνυσμα Μ) -->
                    <marker id="arrowWhite" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
                        <polygon points="0,0 12,5 0,10" fill="#ffffff" />
                    </marker>
                    <!-- Μικρό λευκό βέλος για το μοναδιαίο διάνυσμα (cosφ, sinφ) -->
                    <marker id="arrowWhiteSmall" markerWidth="6" markerHeight="5" refX="5.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
                        <polygon points="0,0 6,2.5 0,5" fill="#ffffff" />
                    </marker>
                    <!-- Glow filter for white point -->
                    <filter id="glowWhite" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur stdDeviation="4.5" result="blur1" />
                        <feGaussianBlur stdDeviation="2" result="blur2" />
                        <feMerge>
                            <feMergeNode in="blur1" />
                            <feMergeNode in="blur2" />
                            <feMergeNode in="blur1" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <!-- Subtle glow for white arrow -->
                    <filter id="glowWhiteSoft" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur stdDeviation="2.5" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <!-- Green circles group -->
                <g id="circlesGroup">
                    <circle cx="0" cy="0" r="50" fill="none" stroke="#2ecc71" stroke-width="1.8" opacity="0.7" id="circle1" />
                    <circle cx="0" cy="0" r="100" fill="none" stroke="#2ecc71" stroke-width="1.8" opacity="0.7" id="circle2" />
                    <circle cx="0" cy="0" r="150" fill="none" stroke="#2ecc71" stroke-width="1.8" opacity="0.7" id="circle3" />
                    <circle cx="0" cy="0" r="200" fill="none" stroke="#2ecc71" stroke-width="1.8" opacity="0.7" id="circle4" />
                    <circle cx="0" cy="0" r="250" fill="none" stroke="#2ecc71" stroke-width="1.8" opacity="0.7" id="circle5" />
                </g>

                <!-- Red arrows group -->
                <g id="arrowsGroup" stroke="#e74c3c" stroke-width="2.2" marker-end="url(#arrowRed)">
                    <!-- 12 arrows at 0°,30°,60°,...,330° - length ~275 (5.5 units) -->
                </g>

                <!-- Arrow labels group -->
                <g id="arrowLabelsGroup" fill="#ffaaaa" font-size="13" font-family="'Segoe UI',Arial,sans-serif" text-anchor="middle" dominant-baseline="central">
                </g>

                <!-- Numbering on 0° ray (always visible) -->
                <g id="rayNumbering0" fill="#2ecc71" font-size="15" font-weight="bold" font-family="'Segoe UI',Arial,sans-serif" text-anchor="middle" dominant-baseline="central">
                    <text x="55" y="10">1</text>
                    <text x="105" y="10">2</text>
                    <text x="155" y="10">3</text>
                    <text x="205" y="10">4</text>
                    <text x="255" y="10">5</text>
                </g>

                <!-- Cardinal numbering (appears when tab is selected) -->
                <g id="cardinalLabelsGroup" fill="#ffcc80" font-size="16" font-weight="bold" font-family="'Segoe UI',Arial,sans-serif" text-anchor="middle" dominant-baseline="central" opacity="0" pointer-events="none">
                    <!-- 0° positive -->
                    <text x="290" y="6" fill="#ffcc80">+</text>
                    <!-- 90° positive -->
                    <text x="6" y="-290" fill="#ffcc80">+</text>
                    <!-- 180° negative -->
                    <text x="-295" y="6" fill="#ffcc80">−</text>
                    <!-- 270° negative -->
                    <text x="6" y="295" fill="#ffcc80">−</text>
                </g>

                <!-- Invisible clickable rays (wider for easy tapping) -->
                <g id="clickableRaysGroup" stroke="transparent" stroke-width="22" cursor="pointer" fill="none">
                </g>

                <!-- Dynamic elements group -->
                <g id="dynamicGroup" pointer-events="none">
                    <!-- White glowing point -->
                    <circle id="whitePoint" cx="0" cy="0" r="0" fill="#ffffff" filter="url(#glowWhite)" opacity="0" />
                    <!-- Dotted lines, cyan segments, white arrow, triangle etc. -->
                </g>
            </svg>
        </div>

        <!-- Tabs -->
        <div class="tabs-container" id="tabsContainer">
            <button class="tab-btn" id="tabTetmimeni" data-tab="tetmimeni">τετμημένη-τεταγμένη</button>
            <button class="tab-btn" id="tabKatefthynsi" data-tab="katefthynsi">κατεύθυνση-απόσταση</button>
        </div>

        <!-- Tab content -->
        <div class="tab-content hidden" id="contentTetmimeni">
            <div class="coord-display" id="coordDisplayTetmimeni">
                (<span class="clickable-x" id="spanX">x</span>, <span class="clickable-y" id="spanY">y</span>)
            </div>
            <div class="sub-display" id="subDisplayTetmimeni"></div>
            <div class="btn-center" id="triangleBtnContainerTetmimeni" style="display:none;">
                <button class="triangle-btn" id="triangleBtnTetmimeni">▿ τρίγωνο</button>
            </div>
        </div>

        <div class="tab-content hidden" id="contentKatefthynsi">
            <div class="coord-display" id="coordDisplayKatefthynsi">
                <span class="clickable-xy blinking-slow" id="spanXY">(x, y)</span>
            </div>
            <div class="sub-display" id="subDisplayKatefthynsi"></div>
            <div class="btn-center" id="triangleBtnContainerKatefthynsi" style="display:none;">
                <button class="triangle-btn" id="triangleBtnKatefthynsi">▿ τρίγωνο</button>
            </div>
        </div>

        <!-- Signature -->
        <div class="signature">Κώστας Κούδας</div>
    </div>

    <script>
        (function() {
            // ============ CONSTANTS ============
            const SCALE = 50; // pixels per unit
            const ANGLES_DEG = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
            const CARDINAL_ANGLES = new Set([0, 90, 180, 270]);
            const TRIANGLE_ANGLES = new Set([30, 60]);
            const ALLOWED_RADII = [2, 3, 4, 5];
            const ARROW_LENGTH_UNITS = 5.5;
            const ARROW_LENGTH = ARROW_LENGTH_UNITS * SCALE; // 275

            // ============ DOM REFERENCES ============
            const svg = document.getElementById('polarSvg');
            const circlesGroup = document.getElementById('circlesGroup');
            const arrowsGroup = document.getElementById('arrowsGroup');
            const arrowLabelsGroup = document.getElementById('arrowLabelsGroup');
            const cardinalLabelsGroup = document.getElementById('cardinalLabelsGroup');
            const clickableRaysGroup = document.getElementById('clickableRaysGroup');
            const dynamicGroup = document.getElementById('dynamicGroup');
            const whitePoint = document.getElementById('whitePoint');

            const tabTetmimeni = document.getElementById('tabTetmimeni');
            const tabKatefthynsi = document.getElementById('tabKatefthynsi');
            const contentTetmimeni = document.getElementById('contentTetmimeni');
            const contentKatefthynsi = document.getElementById('contentKatefthynsi');
            const coordDisplayTet = document.getElementById('coordDisplayTetmimeni');
            const subDisplayTet = document.getElementById('subDisplayTetmimeni');
            const triangleBtnContainerTet = document.getElementById('triangleBtnContainerTetmimeni');
            const triangleBtnTet = document.getElementById('triangleBtnTetmimeni');
            const spanX = document.getElementById('spanX');
            const spanY = document.getElementById('spanY');

            const coordDisplayKat = document.getElementById('coordDisplayKatefthynsi');
            const subDisplayKat = document.getElementById('subDisplayKatefthynsi');
            const triangleBtnContainerKat = document.getElementById('triangleBtnContainerKatefthynsi');
            const triangleBtnKat = document.getElementById('triangleBtnKatefthynsi');
            const spanXY = document.getElementById('spanXY');

            const btnReset = document.getElementById('btnReset');

            // ============ STATE ============
            let state = {
                pointSelected: null, // {phi_deg, rho, X, Y} | null
                activeTab: null, // 'tetmimeni' | 'katefthynsi' | null
                tetmimeni: {
                    xClicked: false,
                    yClicked: false,
                },
                katefthynsi: {
                    clickCount: 0, // 0, 1, 2
                },
                triangleVisible: false,
            };

            // Dynamic SVG element IDs for cleanup
            let dynamicElementIds = [];

            function generateDynamicId() {
                const id = 'dyn_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                dynamicElementIds.push(id);
                return id;
            }

            function clearDynamicElements() {
                dynamicElementIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.remove();
                });
                dynamicElementIds = [];
                // Also clear any leftover elements in dynamicGroup that might not have been tracked
                while (dynamicGroup.children.length > 1) {
                    // keep whitePoint
                    const last = dynamicGroup.lastElementChild;
                    if (last && last.id !== 'whitePoint') {
                        last.remove();
                    } else if (dynamicGroup.children.length <= 1) {
                        break;
                    } else {
                        // remove something else
                        for (const child of dynamicGroup.children) {
                            if (child.id !== 'whitePoint') {
                                child.remove();
                                break;
                            }
                        }
                    }
                }
            }

            function resetWhitePoint() {
                whitePoint.setAttribute('r', '0');
                whitePoint.setAttribute('opacity', '0');
                whitePoint.setAttribute('cx', '0');
                whitePoint.setAttribute('cy', '0');
            }

            function fullReset() {
                state.pointSelected = null;
                state.activeTab = null;
                state.tetmimeni = { xClicked: false, yClicked: false };
                state.katefthynsi = { clickCount: 0 };
                state.triangleVisible = false;
                clearDynamicElements();
                resetWhitePoint();
                resetAllOpacities();
                cardinalLabelsGroup.setAttribute('opacity', '0');
                hideAllTabContent();
                resetTabButtons();
                resetTetDisplay();
                resetKatDisplay();
                triangleBtnContainerTet.style.display = 'none';
                triangleBtnContainerKat.style.display = 'none';
                triangleBtnTet.classList.remove('active-tri');
                triangleBtnKat.classList.remove('active-tri');
                spanX.classList.remove('blinking');
                spanY.classList.remove('blinking');
                spanXY.classList.remove('shimmer-glow');
                spanXY.classList.add('blinking-slow');
                spanXY.innerHTML = '(x, y)';
                spanXY.style.cursor = 'pointer';
            }

            function resetAllOpacities() {
                circlesGroup.querySelectorAll('circle').forEach(c => c.setAttribute('opacity', '0.7'));
                arrowsGroup.querySelectorAll('line,path,polyline').forEach(el => el.setAttribute('opacity', '1'));
                arrowsGroup.querySelectorAll('line').forEach(el => {
                    el.setAttribute('stroke', '#e74c3c');
                    el.setAttribute('stroke-width', '2.2');
                });
                arrowLabelsGroup.querySelectorAll('text').forEach(t => t.setAttribute('opacity', '1'));
                // restore non-cardinal arrows
                updateArrowOpacitiesForTab(null);
            }

            function updateArrowOpacitiesForTab(tab) {
                const arrowLines = arrowsGroup.querySelectorAll('line');
                const labelTexts = arrowLabelsGroup.querySelectorAll('text');
                arrowLines.forEach(line => {
                    const angle = parseFloat(line.getAttribute('data-angle'));
                    if (tab && !CARDINAL_ANGLES.has(angle)) {
                        line.setAttribute('opacity', '0.25');
                        line.setAttribute('stroke', '#e74c3c55');
                    } else {
                        line.setAttribute('opacity', '1');
                        line.setAttribute('stroke', '#e74c3c');
                    }
                });
                labelTexts.forEach(txt => {
                    const angle = parseFloat(txt.getAttribute('data-angle'));
                    if (tab && !CARDINAL_ANGLES.has(angle)) {
                        txt.setAttribute('opacity', '0.25');
                    } else {
                        txt.setAttribute('opacity', '1');
                    }
                });
                // Circles
                circlesGroup.querySelectorAll('circle').forEach(c => {
                    c.setAttribute('opacity', tab ? '0.25' : '0.7');
                });
                // Cardinal labels
                cardinalLabelsGroup.setAttribute('opacity', tab ? '1' : '0');
            }

            function hideAllTabContent() {
                contentTetmimeni.classList.add('hidden');
                contentKatefthynsi.classList.add('hidden');
            }

            function resetTabButtons() {
                tabTetmimeni.classList.remove('active');
                tabKatefthynsi.classList.remove('active');
            }

            function resetTetDisplay() {
                spanX.innerHTML = 'x';
                spanY.innerHTML = 'y';
                spanX.classList.remove('blinking');
                spanY.classList.remove('blinking');
                spanX.style.cursor = 'pointer';
                spanY.style.cursor = 'pointer';
                subDisplayTet.innerHTML = '';
                triangleBtnContainerTet.style.display = 'none';
                triangleBtnTet.classList.remove('active-tri');
                state.tetmimeni = { xClicked: false, yClicked: false };
                state.triangleVisible = false;
                clearTriangleFromSVG();
            }

            function resetKatDisplay() {
                spanXY.innerHTML = '(x, y)';
                spanXY.classList.remove('shimmer-glow');
                spanXY.classList.add('blinking-slow');
                spanXY.style.cursor = 'pointer';
                subDisplayKat.innerHTML = '';
                triangleBtnContainerKat.style.display = 'none';
                triangleBtnKat.classList.remove('active-tri');
                state.katefthynsi = { clickCount: 0 };
                state.triangleVisible = false;
                clearTriangleFromSVG();
                clearKatDynamicSVG();
            }

            function clearKatDynamicSVG() {
                // Remove white arrow, cyan dotted lines specific to kat tab
                const idsToRemove = [];
                dynamicElementIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && (el.getAttribute('data-kat') === 'true')) {
                        idsToRemove.push(id);
                        el.remove();
                    }
                });
                dynamicElementIds = dynamicElementIds.filter(id => !idsToRemove.includes(id));
                // Also remove any white arrow or kat-specific elements
                const toRemove = [];
                for (const child of dynamicGroup.children) {
                    if (child.getAttribute &&
                        (child.getAttribute('data-kat') === 'true' ||
                            child.id === 'whiteArrow' ||
                            child.id === 'katDottedH' ||
                            child.id === 'katDottedV')) {
                        toRemove.push(child);
                    }
                }
                toRemove.forEach(c => c.remove());
            }

            function clearTriangleFromSVG() {
                const toRemove = [];
                for (const child of dynamicGroup.children) {
                    if (child.getAttribute && child.getAttribute('data-triangle') === 'true') {
                        toRemove.push(child);
                    }
                }
                toRemove.forEach(c => c.remove());
                dynamicElementIds = dynamicElementIds.filter(id => {
                    const el = document.getElementById(id);

            // ============ BUILD SVG ============

                ANGLES_DEG.forEach(deg => {
                    const rad = deg * Math.PI / 180;
                    const ex = ARROW_LENGTH * Math.cos(rad);
                    const ey = -ARROW_LENGTH * Math.sin(rad); // SVG y is inverted

                    // Arrow line
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', '0');

                    // Angle label
                    const lx = (ARROW_LENGTH + 22) * Math.cos(rad);
                    const ly = -(ARROW_LENGTH + 22) * Math.sin(rad);
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', lx);

                    arrowLabelsGroup.appendChild(text);

                    // Invisible clickable ray
                    const clickLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    clickLine.setAttribute('x1', '0');

                    clickLine.setAttribute('fill', 'none');
                    clickLine.setAttribute('cursor', 'pointer');
                    clickLine.setAttribute('data-angle', deg);
                    clickLine.style.pointerEvents = 'stroke';
                    clickLine.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleRayClick(deg, e);
                    });
                    clickLine.addEventListener('touchend', function(e) {
                        e.stopPropagation();

                    });

            function handleRayClick(deg, event) {
                if (!state.pointSelected) {
                    // First time: select the point at radius 2 (default closest to center allowed)
                }
                // Determine click position relative to SVG
                const svgRect = svg.getBoundingClientRect();
                const svgWidth = svgRect.width;
                const svgHeight = svgRect.height;
                const viewBoxW = 680;
                const viewBoxH = 680;
                const scaleX = viewBoxW / svgWidth;
                const scaleY = viewBoxH / svgHeight;

                let clientX, clientY;
                if (event.touches && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                } else if (event.changedTouches && event.changedTouches.length > 0) {
                    clientX = event.changedTouches[0].clientX;
                    clientY = event.changedTouches[0].clientY;
                } else {
                    clientX = event.clientX;
                    clientY = event.clientY;
                }

                const svgX = (clientX - svgRect.left) * scaleX - 340;
                const svgY = (clientY - svgRect.top) * scaleY - 340;
                const mathX = svgX;
                const mathY = -svgY;
                const distUnits = Math.sqrt(mathX * mathX + mathY * mathY) / SCALE;

                // Snap to nearest allowed radius (2,3,4,5)
                let bestRho = ALLOWED_RADII[0];
                let bestDist = Math.abs(distUnits - ALLOWED_RADII[0]);
                for (let i = 1; i < ALLOWED_RADII.length; i++) {
                    const d = Math.abs(distUnits - ALLOWED_RADII[i]);
                    if (d < bestDist) {
                        bestDist = d;
                        bestRho = ALLOWED_RADII[i];
                    }
                }
                const rho = bestRho;
                const phi_deg = deg;
                const phi_rad = phi_deg * Math.PI / 180;
                const X = rho * Math.cos(phi_rad);
                const Y = rho * Math.sin(phi_rad);

                // Update state
                state.pointSelected = { phi_deg, rho, X, Y };
                state.tetmimeni = { xClicked: false, yClicked: false };
                state.katefthynsi = { clickCount: 0 };
                state.triangleVisible = false;
                clearDynamicElements();
                clearTriangleFromSVG();
                resetTetDisplay();
                resetKatDisplay();
                triangleBtnContainerTet.style.display = 'none';
                triangleBtnContainerKat.style.display = 'none';

                // Place white point
                const svgPX = X * SCALE;
                const svgPY = -Y * SCALE;
                whitePoint.setAttribute('cx', svgPX);
                whitePoint.setAttribute('cy', svgPY);
                whitePoint.setAttribute('r', '8');
                whitePoint.setAttribute('opacity', '1');

                // If a tab is active, reset its display
                if (state.activeTab === 'tetmimeni') {
                    resetTetDisplay();
                    updateTetDisplay();
                } else if (state.activeTab === 'katefthynsi') {
                    resetKatDisplay();
                    updateKatDisplay();
                }
            }

                arrowLine.setAttribute('stroke', '#ffffff');
                arrowLine.setAttribute('stroke-width', '4');
                arrowLine.setAttribute('marker-end', 'url(#arrowWhite)');
                arrowLine.setAttribute('filter', 'url(#glowWhiteSoft)');
                arrowLine.setAttribute('data-kat', 'true');
                arrowLine.setAttribute('data-white-arrow', 'true');
                dynamicGroup.appendChild(arrowLine);
            }

            function drawTriangleKat1(cosPhi, sinPhi) {
                clearTriangleFromSVG();
                const ux = cosPhi * SCALE;
                const uy = -sinPhi * SCALE;
                const ux0 = cosPhi * SCALE;
                const uy0 = 0;
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                const pId = generateDynamicId();
                poly.setAttribute('id', pId);
                poly.setAttribute('points', '0,0 ' + ux + ',' + uy + ' ' + ux0 + ',' + uy0);
                poly.setAttribute('fill', '#ffffff');
                poly.setAttribute('opacity', '0.25');
                poly.setAttribute('stroke', '#ffffff');
                poly.setAttribute('stroke-width', '1.5');
                poly.setAttribute('stroke-opacity', '0.5');
                poly.setAttribute('data-triangle', 'true');
                poly.setAttribute('data-kat', 'true');
                dynamicGroup.appendChild(poly);
                state.triangleVisible = true;
                triangleBtnKat.classList.add('active-tri');
            }

            function drawTriangleKat2(X, Y) {
                clearTriangleFromSVG();
                const svgX = X * SCALE;
                const svgY = -Y * SCALE;
                const svgX0 = X * SCALE;
                const svgY0 = 0;
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                const pId = generateDynamicId();
                poly.setAttribute('id', pId);
                poly.setAttribute('points', '0,0 ' + svgX + ',' + svgY + ' ' + svgX0 + ',' + svgY0);
                poly.setAttribute('fill', '#ffffff');
                poly.setAttribute('opacity', '0.25');
                poly.setAttribute('stroke', '#ffffff');
                poly.setAttribute('stroke-width', '1.5');
                poly.setAttribute('stroke-opacity', '0.5');
                poly.setAttribute('data-triangle', 'true');
                poly.setAttribute('data-kat', 'true');
                dynamicGroup.appendChild(poly);
                state.triangleVisible = true;
                triangleBtnKat.classList.add('active-tri');
            }

            // Click handler for (x,y) in kat tab
            spanXY.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!state.pointSelected) return;
                if (state.activeTab !== 'katefthynsi') return;
                if (state.katefthynsi.clickCount >= 2) return; // max reached
                state.katefthynsi.clickCount++;
                state.triangleVisible = false;
                clearTriangleFromSVG();
                triangleBtnKat.classList.remove('active-tri');
                updateKatDisplay();
            });

            // Triangle button for kat tab
            triangleBtnKat.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!state.pointSelected) return;
                if (state.activeTab !== 'katefthynsi') return;
                if (state.katefthynsi.clickCount === 0) return;
                const phi_deg = state.pointSelected.phi_deg;
                if (!TRIANGLE_ANGLES.has(phi_deg)) return;
                if (state.triangleVisible) {
                    clearTriangleFromSVG();
                    triangleBtnKat.classList.remove('active-tri');
                } else {
                    if (state.katefthynsi.clickCount === 1) {
                        const phi_rad = phi_deg * Math.PI / 180;
                        drawTriangleKat1(Math.cos(phi_rad), Math.sin(phi_rad));
                    } else if (state.katefthynsi.clickCount === 2) {
                        drawTriangleKat2(state.pointSelected.X, state.pointSelected.Y);
                    }
                }
            });

            // ============ RESET ============
            btnReset.addEventListener('click', function() {
                fullReset();
                hideAllTabContent();
                resetTabButtons();
                state.activeTab = null;
                updateArrowOpacitiesForTab(null);
                cardinalLabelsGroup.setAttribute('opacity', '0');
            });

            // ============ UTILS ============
            function formatNum(num) {
                const rounded = Math.round(num * 10000) / 10000;
                if (Number.isInteger(rounded)) return rounded.toString();
                // Trim trailing zeros
                let s = rounded.toFixed(4);
                s = s.replace(/\.?0+$/, '');
                if (s === '' || s === '-') s = '0';
                return s;
            }

            // ============ INITIALIZATION ============
            function init() {
                buildArrowsAndLabels();
                resetWhitePoint();
                hideAllTabContent();
                resetTabButtons();
                updateArrowOpacitiesForTab(null);
                cardinalLabelsGroup.setAttribute('opacity', '0');
            }

            init();

            // ============ MOBILE TOUCH HANDLING FOR SVG ============
            // Prevent double-tap zoom on the SVG wrapper
            const svgWrapper = document.getElementById('svgWrapper');
            svgWrapper.addEventListener('touchstart', function(e) {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });

            let lastTouchEnd = 0;
            svgWrapper.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // ============ KEYBOARD SHORTCUT FOR RESET ============
            document.addEventListener('keydown', function(e) {
                if (e.key === 'r' && e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey) {
                    e.preventDefault();
                    fullReset();
                    hideAllTabContent();
                    resetTabButtons();
                    state.activeTab = null;
                    updateArrowOpacitiesForTab(null);
                    cardinalLabelsGroup.setAttribute('opacity', '0');
                }
            });

            console.log('Πολικές Συντεταγμένες – Έτοιμο. Πατήστε σε μια ημιευθεία για να ξεκινήσετε.');
            console.log('Συντόμευση: Ctrl+R για ανανέωση.');
        })();
    </script>
</body>
</html>
