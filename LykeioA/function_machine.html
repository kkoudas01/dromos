<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Μηχάνημα Συνάρτησης f</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel-bg: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --green: #4ade80;
    --red: #f87171;
    --white: #f1f5f9;
    --gray: #64748b;
    --machine: #6b7280;
    --machine-dark: #4b5563;
    --header-bg: #0f3460;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: var(--white);
    margin-bottom: 18px;
    text-align: center;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    background: var(--panel-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 480px;
    width: 100%;
  }

  #setup-screen label {
    display: block;
    margin-bottom: 10px;
    color: var(--gray);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .func-input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .func-prefix {
    font-size: 1.4rem;
    color: var(--white);
    white-space: nowrap;
  }

  #func-input {
    flex: 1;
    min-width: 120px;
    background: #0f172a;
    border: 2px solid var(--border);
    border-radius: 6px;
    color: var(--green);
    font-family: 'Courier New', monospace;
    font-size: 1.2rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #func-input:focus { border-color: var(--accent); }

  #btn-set {
    background: #1e4a8a;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 14px;
    width: 100%;
  }
  #btn-set:hover { background: #2563a8; transform: translateY(-1px); }

  #func-display {
    margin-top: 14px;
    font-size: 1.1rem;
    color: var(--white);
    min-height: 24px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  #error-msg {
    color: var(--red);
    font-size: 0.85rem;
    margin-top: 6px;
    min-height: 18px;
  }

  /* ── MAIN GRID ── */
  #main-grid {
    display: none;
    width: 100%;
    max-width: 900px;
    margin-top: 10px;
  }

  .func-label-top {
    text-align: center;
    font-size: 1rem;
    color: var(--gray);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
  }

  .func-label-top span { color: var(--white); }

  .grid-2x2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 10px;
  }

  .panel {
    background: var(--panel-bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    min-height: 220px;
    overflow-y: auto;
    overflow-x: hidden;
    cursor: pointer;
    transition: border-color 0.25s;
    position: relative;
  }
  .panel:hover { border-color: #1e4a8a; }
  .panel:active { border-color: var(--accent); }

  /* Hint */
  .click-hint {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 0.65rem;
    color: #334155;
    pointer-events: none;
  }

  /* ── PANEL 1,1 : MACHINE ── */
  #panel-machine {
    cursor: default;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #btn-sign {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: #1e293b;
    border: 2px solid var(--border);
    color: var(--white);
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
    line-height: 1;
  }
  #btn-sign:hover { background: #334155; border-color: var(--green); }

  #input-box {
    background: #0f172a;
    border: 2px solid var(--border);
    border-radius: 6px;
    color: var(--green);
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    padding: 5px 10px;
    width: 90px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input-box:focus { border-color: var(--green); }

  #btn-run {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  #btn-run:hover { background: #22c55e; transform: scale(1.1); }

  .machine-wrapper {
    width: 100%;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
  }

  .machine-svg-row {
    position: relative;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  /* falling number above machine */
  #falling-num {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--green);
    opacity: 0;
    transition: top 0.6s ease-in, opacity 0.2s;
    pointer-events: none;
    z-index: 10;
  }

  /* output to the right, aligned with spout (~60% down SVG) */
  #output-area {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 0;
    min-width: 44px;
    padding-left: 4px;
    margin-top: 28px; /* nudge down to spout level */
  }

  #output-label {
    font-size: 0.72rem;
    color: var(--gray);
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    line-height: 1;
  }

  #output-num {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--red);
    opacity: 0;
    transition: opacity 0.4s;
    word-break: break-word;
    max-width: 110px;
    line-height: 1.25;
  }

  /* warning badge — sits below the row */
  #machine-warning {
    display: none;
    align-items: center;
    gap: 8px;
    background: #451a03;
    border: 2px solid #f97316;
    border-radius: 8px;
    padding: 6px 12px;
    margin-top: 6px;
    font-size: 0.88rem;
    color: #fed7aa;
    width: 100%;
  }
  #machine-warning.show { display: flex; animation: fadeIn 0.3s forwards; }

  /* ── PANEL 1,2 : ARROWS ── */
  #panel-arrows {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-top: 10px;
  }

  .arrow-row {
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 0.4s forwards;
  }

  .arr-input {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--green);
    min-width: 28px;
    text-align: right;
  }

  .arr-arrow-wrap {
    flex: 1;
    position: relative;
    height: 30px;
    overflow: hidden;
  }

  .arr-arrow-label {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    font-family: serif;
    font-style: italic;
    font-weight: bold;
    color: var(--white);
  }

  .arr-arrow-body {
    position: absolute;
    bottom: 6px; left: 0;
    height: 4px;
    background: var(--gray);
    width: 0;
    transition: width 0.5s ease-out;
    border-radius: 2px;
  }

  .arr-arrow-head {
    position: absolute;
    bottom: 2px; right: 0;
    width: 0; height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid var(--gray);
    opacity: 0;
    /* no transition here — toggled instantly via JS */
  }

  .arr-output {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--red);
    min-width: 28px;
    opacity: 0;
    transition: opacity 0.35s;
  }

  /* ── PANEL 2,1 : NOTATION ── */
  #panel-notation {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-top: 8px;
  }

  .notation-line {
    font-size: 1.3rem;
    opacity: 0;
    animation: fadeIn 0.35s forwards;
  }

  .nl-f { color: var(--white); }
  .nl-open { color: var(--white); }
  .nl-x { color: var(--green); font-weight: bold; }
  .nl-close { color: var(--white); }
  .nl-eq { color: var(--white); }
  .nl-y { color: var(--red); font-weight: bold; }
  .nl-all-green .nl-f,
  .nl-all-green .nl-open,
  .nl-all-green .nl-close { color: var(--green); }
  .nl-all-green .nl-y { color: var(--green); }

  /* ── PANEL 2,2 : TABLE ── */
  #panel-table {
    padding-top: 4px;
  }

  .ftable {
    width: 100%;
    border-collapse: collapse;
    font-size: 1rem;
  }

  .ftable th {
    background: #000;
    padding: 8px 12px;
    font-weight: bold;
  }
  .ftable th:first-child { color: var(--green); }
  .ftable th:last-child { color: var(--red); }

  .ftable td {
    padding: 7px 12px;
    text-align: center;
    border: 1px solid #1e293b;
    background: var(--machine-dark);
  }
  .ftable td:first-child { color: var(--green); }
  .ftable td:last-child { color: var(--red); }

  .ftable tr.new-row { animation: fadeIn 0.4s forwards; }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes gearSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .spinning { animation: gearSpin 1.2s linear infinite; }

  /* ── TOP BAR ── */
  #top-bar {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .top-btn {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--gray);
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .top-btn:hover { border-color: var(--accent); color: var(--white); background: #1e1e3a; }

  /* ── SIGNATURE ── */
  #signature {
    position: fixed;
    bottom: 10px; right: 14px;
    font-size: 0.72rem;
    color: #2d3f55;
    letter-spacing: 0.06em;
    pointer-events: none;
    user-select: none;
  }

  /* ── MATH RENDERING ── */
  .math-frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 2px;
    font-size: 0.88em;
    line-height: 1.15;
  }
  .math-frac .frac-num {
    border-bottom: 1.5px solid currentColor;
    padding: 0 4px 1px;
    text-align: center;
    min-width: 10px;
  }
  .math-frac .frac-den {
    padding: 1px 4px 0;
    text-align: center;
    min-width: 10px;
  }
  .math-sqrt {
    display: inline-flex;
    align-items: stretch;
    vertical-align: middle;
    margin: 0 2px;
  }
  .math-sqrt .sqrt-radical {
    font-size: 1.25em;
    line-height: 1;
    padding-right: 1px;
    display: flex;
    align-items: flex-end;
  }
  .math-sqrt .sqrt-content {
    border-top: 1.5px solid currentColor;
    padding: 0 3px;
    display: inline-block;
  }
  #func-show { vertical-align: middle; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .grid-2x2 {
      grid-template-columns: 1fr;
    }
    .panel { min-height: 180px; }
    h1 { font-size: 1.1rem; }
  }

  /* scrollbar style */
  .panel::-webkit-scrollbar { width: 5px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>

<!-- TOP BAR (always visible) -->
<div id="top-bar">
  <button class="top-btn" id="btn-back" onclick="window.location.href='index.html'" title="Επιστροφή στην αρχική">← Αρχική</button>
  <h1 style="margin:0;font-size:1.2rem;">⚙ Μηχάνημα Συνάρτησης</h1>
  <button class="top-btn" id="btn-new-func" style="display:none;" onclick="resetToSetup()">↺ Νέα Συνάρτηση</button>
</div>

<!-- SIGNATURE -->
<div id="signature">Κώστας Κούδας</div>

<!-- SETUP -->
<div id="setup-screen">
  <label>Ορίστε τη συνάρτηση (χρησιμοποιήστε <strong>x</strong> ως μεταβλητή):</label>
  <div class="func-input-row">
    <span class="func-prefix">f(x) =</span>
    <input id="func-input" type="text" placeholder="π.χ. x*x ή 2*x+1" autocomplete="off" spellcheck="false">
  </div>
  <div id="error-msg"></div>
  <button id="btn-set">Εισαγωγή ▶</button>
  <div id="func-display"></div>
</div>

<!-- MAIN -->
<div id="main-grid">
  <div class="func-label-top">
    Συνάρτηση: &nbsp;<span id="func-show"></span>
  </div>

  <div class="grid-2x2">

    <!-- (1,1) MACHINE -->
    <div class="panel" id="panel-machine">
      <div class="input-row">
        <input id="input-box" type="text" inputmode="text" placeholder="input" autocomplete="off">
        <button id="btn-sign" title="Αλλαγή προσήμου">±</button>
        <button id="btn-run"></button>
      </div>
      <div class="machine-wrapper">
        <div class="machine-svg-row">
          <div id="falling-num"></div>
          <!-- SVG MACHINE -->
          <svg id="machine-svg" viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:210px;">
            <!-- funnel -->
            <polygon points="70,10 150,10 130,40 90,40" fill="#6b7280"/>
            <!-- body -->
            <rect x="60" y="40" width="110" height="90" rx="8" fill="#6b7280"/>
            <!-- output spout -->
            <polygon points="170,85 195,75 195,105 170,95" fill="#4b5563"/>
            <!-- gears -->
            <g id="gear1" transform="translate(90,90)">
              <circle r="18" fill="#374151" stroke="#9ca3af" stroke-width="2"/>
              <rect x="-3" y="-22" width="6" height="10" rx="2" fill="#9ca3af"/>
              <rect x="-3" y="12" width="6" height="10" rx="2" fill="#9ca3af"/>
              <rect x="-22" y="-3" width="10" height="6" rx="2" fill="#9ca3af"/>
              <rect x="12" y="-3" width="10" height="6" rx="2" fill="#9ca3af"/>
              <circle r="5" fill="#1f2937"/>
            </g>
            <g id="gear2" transform="translate(125,100)">
              <circle r="12" fill="#374151" stroke="#9ca3af" stroke-width="1.5"/>
              <rect x="-2" y="-15" width="4" height="7" rx="1" fill="#9ca3af"/>
              <rect x="-2" y="8" width="4" height="7" rx="1" fill="#9ca3af"/>
              <rect x="-15" y="-2" width="7" height="4" rx="1" fill="#9ca3af"/>
              <rect x="8" y="-2" width="7" height="4" rx="1" fill="#9ca3af"/>
              <circle r="3.5" fill="#1f2937"/>
            </g>
            <!-- f label -->
            <text x="148" y="78" font-size="28" font-family="serif" font-weight="bold"
                  fill="#1f2937" stroke="#000" stroke-width="1" text-anchor="middle">f</text>
          </svg>
        </div>
        <!-- output to the right of the spout -->
        <div id="output-area">
          <span id="output-label">▶</span>
          <span id="output-num"></span>
        </div>
      </div>
      <!-- warning sits below the machine row -->
      <div id="machine-warning">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 21h20L12 2z" fill="#f97316" stroke="#f97316" stroke-width="1"/>
          <text x="12" y="17" font-size="11" font-weight="bold" fill="#1a1a1a" text-anchor="middle">!</text>
        </svg>
        <span>σφάλμα εισόδου</span>
      </div>
    </div>

    <!-- (1,2) ARROWS -->
    <div class="panel" id="panel-arrows">
      <div class="click-hint">κλικ για εμφάνιση</div>
    </div>

    <!-- (2,1) NOTATION -->
    <div class="panel" id="panel-notation">
      <div class="click-hint">κλικ για εμφάνιση</div>
      <!-- ghost template - always visible at bottom -->
      <div id="notation-ghost" style="font-size:1.3rem; color: var(--gray); opacity:0.35; margin-top:4px;">
        f(<span style="display:inline-block;min-width:8px;">&nbsp;</span>) =
      </div>
    </div>

    <!-- (2,2) TABLE -->
    <div class="panel" id="panel-table">
      <div class="click-hint">κλικ για εμφάνιση</div>
      <table class="ftable">
        <thead>
          <tr><th>x</th><th>f(x)</th></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div><!-- grid -->
</div><!-- main -->

<script>
/* ====================================================
   STATE
   ==================================================== */
let funcStr = '';          // raw expression string
let funcFn  = null;        // compiled function
let currentInput  = null;  // last computed input
let currentOutput = null;  // last computed output

// history arrays  { x, y }
let arrowHistory    = [];
let notationHistory = [];
let tableHistory    = [];

// tracking which panels have been "clicked" for current pair
let arrowShown    = false;
let notationShown = false;
let tableShown    = false;

/* ====================================================
   MATH RENDERING  — produces HTML with fractions & roots
   ==================================================== */

// Tokenise the raw expression into a tree and render as HTML
// Strategy: recursive descent on the raw string
// Supports: +  -  *  /  ^  sqrt(...)  (...)  numbers  x

function mathHTML(expr) {
  // Normalise
  expr = expr.trim()
    .replace(/\*\*/g, '^')
    .replace(/Math\.sqrt\s*\(/gi, 'sqrt(')
    .replace(/Math\.abs\s*\(/gi,  'abs(')
    .replace(/Math\.pow\s*\(([^,]+),([^)]+)\)/gi, '($1)^($2)');

  return renderExpr(expr);
}

// ── helpers ──────────────────────────────────────────

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Find matching closing paren starting just after position `open`
function matchParen(s, open) {
  let depth = 1, i = open + 1;
  while (i < s.length && depth > 0) {
    if (s[i] === '(') depth++;
    else if (s[i] === ')') depth--;
    i++;
  }
  return i - 1; // position of ')'
}

// Find the position of a top-level operator (not inside parens/brackets)
// Scans right-to-left for lowest-precedence ops first (additive before mult)
function findTopOp(s, ops) {
  let depth = 0;
  for (let i = s.length - 1; i >= 0; i--) {
    const c = s[i];
    if (c === ')') depth++;
    else if (c === '(') depth--;
    else if (depth === 0 && ops.includes(c)) {
      // Make sure it's not a unary minus at the very start
      if ((c === '+' || c === '-') && i === 0) continue;
      // Avoid '-' being part of a number exponent like 1e-5
      if (c === '-' && i > 0 && /[eE]/.test(s[i-1])) continue;
      return i;
    }
  }
  return -1;
}

function renderExpr(s) {
  s = s.trim();
  if (!s) return '';

  // ── Addition / subtraction (lowest precedence) ──
  // Find rightmost top-level + or - (skip leading sign)
  let depth = 0;
  for (let i = s.length - 1; i > 0; i--) {
    const c = s[i];
    if (c === ')') depth++;
    else if (c === '(') depth--;
    else if (depth === 0 && (c === '+' || c === '-')) {
      // skip unary or scientific notation
      if (c === '-' && /[eE]/.test(s[i-1])) continue;
      const left  = renderExpr(s.slice(0, i));
      const right = renderExpr(s.slice(i + 1));
      const op = c === '+' ? ' + ' : ' − ';
      // unary minus
      if (i === 0) return '−' + right;
      return left + `<span style="color:var(--white)">${op}</span>` + right;
    }
  }

  // ── Multiplication (implicit or explicit *) ──
  depth = 0;
  for (let i = s.length - 1; i > 0; i--) {
    const c = s[i];
    if (c === ')') depth++;
    else if (c === '(') depth--;
    else if (depth === 0 && c === '*') {
      const left  = renderExpr(s.slice(0, i));
      const right = renderExpr(s.slice(i + 1));
      return left + '<span style="color:var(--white)"> · </span>' + right;
    }
  }

  // ── Division → fraction ──
  depth = 0;
  for (let i = s.length - 1; i > 0; i--) {
    const c = s[i];
    if (c === ')') depth++;
    else if (c === '(') depth--;
    else if (depth === 0 && c === '/') {
      const num = renderExpr(s.slice(0, i));
      const den = renderExpr(s.slice(i + 1));
      return `<span class="math-frac"><span class="frac-num">${num}</span><span class="frac-den">${den}</span></span>`;
    }
  }

  // ── Exponent ^ ──
  depth = 0;
  for (let i = s.length - 1; i > 0; i--) {
    const c = s[i];
    if (c === ')') depth++;
    else if (c === '(') depth--;
    else if (depth === 0 && c === '^') {
      const base = renderExpr(s.slice(0, i));
      const exp  = renderExpr(s.slice(i + 1));
      return `${base}<sup>${exp}</sup>`;
    }
  }

  // ── sqrt(...) ──
  if (/^sqrt\s*\(/i.test(s)) {
    const open  = s.indexOf('(');
    const close = matchParen(s, open);
    const inner = renderExpr(s.slice(open + 1, close));
    const after = s.slice(close + 1).trim();
    const sqrtHtml = `<span class="math-sqrt"><span class="sqrt-radical">√</span><span class="sqrt-content">${inner}</span></span>`;
    return after ? sqrtHtml + renderExpr(after) : sqrtHtml;
  }

  // ── abs(...) ──
  if (/^abs\s*\(/i.test(s)) {
    const open  = s.indexOf('(');
    const close = matchParen(s, open);
    const inner = renderExpr(s.slice(open + 1, close));
    return `|${inner}|`;
  }

  // ── Parenthesised group ──
  if (s[0] === '(' && matchParen(s, 0) === s.length - 1) {
    return '(' + renderExpr(s.slice(1, -1)) + ')';
  }

  // ── Leaf: number or x ──
  if (s === 'x') return '<span style="color:var(--white);font-style:italic">x</span>';
  if (/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(s)) return escHtml(s);

  // Fallback: just escape and return
  return escHtml(s);
}

// Plain text version (for places we can't use HTML)
function prettyFormula(s) {
  return s
    .replace(/\*\*/g, '^')
    .replace(/Math\.sqrt\(/gi, '√(')
    .replace(/Math\.abs\(/gi,  '|')
    .replace(/Math\.pow\(([^,]+),([^)]+)\)/gi, '($1)^($2)')
    .replace(/\*/g, '·')
    .replace(/\s+/g, ' ');
}

/* ====================================================
   FUNCTION COMPILER  (safe eval)
   ==================================================== */
function compileFunc(expr) {
  try {
    let e = expr.trim()
      .replace(/\^/g, '**')
      .replace(/sqrt\s*\(/gi, 'Math.sqrt(')
      .replace(/abs\s*\(/gi,  'Math.abs(');
    const fn = new Function('x', '"use strict"; return (' + e + ');');
    fn(2); // test call
    return fn;
  } catch(err) {
    return null;
  }
}

/* ====================================================
   SETUP SCREEN
   ==================================================== */
document.getElementById('btn-set').addEventListener('click', setupFunction);
document.getElementById('func-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') setupFunction();
});

function setupFunction() {
  const raw = document.getElementById('func-input').value.trim();
  const errEl = document.getElementById('error-msg');
  if (!raw) { errEl.textContent = 'Γράψτε έναν τύπο!'; return; }

  const fn = compileFunc(raw);
  if (!fn) {
    errEl.textContent = 'Μη έγκυρος τύπος. Ελέγξτε τη σύνταξη.';
    return;
  }

  errEl.textContent = '';
  funcStr = raw;
  funcFn  = fn;

  const dispEl = document.getElementById('func-display');
  dispEl.innerHTML = 'f(x) = ' + mathHTML(raw);

  setTimeout(showMain, 400);
}

function showMain() {
  document.getElementById('setup-screen').style.display = 'none';
  const mg = document.getElementById('main-grid');
  mg.style.display = 'block';
  document.getElementById('btn-new-func').style.display = 'inline-block';
  // Render math in header
  const showEl = document.getElementById('func-show');
  showEl.innerHTML = 'f(x) = ' + mathHTML(funcStr);
}

function resetToSetup() {
  // Hide main, show setup
  document.getElementById('main-grid').style.display = 'none';
  document.getElementById('btn-new-func').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';

  // Reset state
  funcStr = ''; funcFn = null;
  currentInput = null; currentOutput = null;
  arrowShown = false; notationShown = false; tableShown = false;
  arrowHistory = []; notationHistory = []; tableHistory = [];

  // Clear panels
  document.getElementById('panel-arrows').innerHTML = '<div class="click-hint">κλικ για εμφάνιση</div>';
  document.getElementById('table-body').innerHTML = '';
  const pn = document.getElementById('panel-notation');
  pn.innerHTML = '<div class="click-hint">κλικ για εμφάνιση</div>' +
    '<div id="notation-ghost" style="font-size:1.3rem;color:var(--gray);opacity:0.35;margin-top:4px;">f(<span style="display:inline-block;min-width:8px;">&nbsp;</span>) =</div>';

  // Reset machine output
  clearMachineOutput();
  document.getElementById('input-box').value = '';
  document.getElementById('func-input').value = '';
  document.getElementById('func-display').innerHTML = '';
  document.getElementById('error-msg').textContent = '';

  // Re-attach notation click (panel was not replaced)
  // panels keep their event listeners since they are not replaced
}

/* ====================================================
   PANEL (1,1) — MACHINE
   ==================================================== */
document.getElementById('btn-run').addEventListener('click', runMachine);
document.getElementById('btn-sign').addEventListener('click', () => {
  const box = document.getElementById('input-box');
  const v = box.value.trim();
  if (v === '' || v === '-') { box.value = v === '-' ? '' : '-'; return; }
  box.value = v.startsWith('-') ? v.slice(1) : '-' + v;
  box.dispatchEvent(new Event('input'));
});
document.getElementById('input-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') runMachine();
});

document.getElementById('input-box').addEventListener('input', function() {
  if (this.value === '') {
    clearMachineOutput();
    currentInput  = null;
    currentOutput = null;
    arrowShown    = false;
    notationShown = false;
    tableShown    = false;
  }
});

function clearMachineOutput() {
  document.getElementById('falling-num').style.opacity = '0';
  document.getElementById('output-num').style.opacity  = '0';
  document.getElementById('output-label').style.opacity = '0';
  document.getElementById('machine-warning').classList.remove('show');
}

function formatNum(n) {
  // Up to 2 decimal places, strip trailing zeros
  return parseFloat(n.toFixed(2)).toString();
}

function runMachine() {
  const val = document.getElementById('input-box').value.trim();
  if (val === '' || isNaN(Number(val))) return;

  const x = Number(val);
  let y;
  let isError = false;
  try { y = funcFn(x); } catch(e) { isError = true; }
  if (!isError && !isFinite(y)) isError = true;
  if (isNaN(y)) isError = true;

  // Hide warning first
  document.getElementById('machine-warning').classList.remove('show');

  if (isError) {
    // Show warning
    document.getElementById('output-num').style.opacity = '0';
    document.getElementById('output-label').style.opacity = '0';
    document.getElementById('machine-warning').classList.add('show');
    currentInput  = null;
    currentOutput = null;
    return;
  }

  y = Math.round(y * 1e10) / 1e10; // clean float
  const yDisplay = formatNum(y);

  currentInput  = x;
  currentOutput = yDisplay;

  // Reset panel flags for new pair
  arrowShown    = false;
  notationShown = false;
  tableShown    = false;

  animateMachine(x, yDisplay);
}

function animateMachine(x, y) {
  const fallEl   = document.getElementById('falling-num');
  const outEl    = document.getElementById('output-num');
  const labelEl  = document.getElementById('output-label');

  // Reset
  fallEl.style.transition = 'none';
  fallEl.style.top   = '-8px';
  fallEl.style.opacity = '0';
  outEl.style.opacity = '0';
  labelEl.style.opacity = '0';
  fallEl.textContent = x;

  // Start gears spinning
  document.getElementById('gear1').classList.add('spinning');
  document.getElementById('gear2').classList.add('spinning');

  // Drop the number in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fallEl.style.transition = 'top 0.55s ease-in, opacity 0.15s';
      fallEl.style.opacity = '1';
      fallEl.style.top = '32px'; // into funnel
    });
  });

  // After number falls, show output
  setTimeout(() => {
    fallEl.style.opacity = '0';
    outEl.textContent = y;
    outEl.style.opacity = '1';
    labelEl.style.opacity = '1';
    // Stop gears
    document.getElementById('gear1').classList.remove('spinning');
    document.getElementById('gear2').classList.remove('spinning');
  }, 900);
}

/* ====================================================
   PANEL (1,2) — ARROWS
   ==================================================== */
document.getElementById('panel-arrows').addEventListener('click', () => {
  if (currentInput === null || arrowShown) return;
  arrowShown = true;
  addArrowRow(currentInput, currentOutput);
  arrowHistory.push({ x: currentInput, y: currentOutput });
});

function addArrowRow(x, y) {
  const panel = document.getElementById('panel-arrows');
  // Remove hint on first add
  const hint = panel.querySelector('.click-hint');
  if (hint) hint.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'arrow-row';
  row.innerHTML = `
    <div class="arr-input">${x}</div>
    <div class="arr-arrow-wrap">
      <div class="arr-arrow-label">f</div>
      <div class="arr-arrow-body" id="ab-${Date.now()}"></div>
      <div class="arr-arrow-head" id="ah-${Date.now()}"></div>
    </div>
    <div class="arr-output" id="ao-${Date.now()}">${y}</div>
  `;
  panel.appendChild(row);

  // Animate arrow
  const body  = row.querySelector('.arr-arrow-body');
  const head  = row.querySelector('.arr-arrow-head');
  const outEl = row.querySelector('.arr-output');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      body.style.width  = 'calc(100% - 12px)';
      // arrowhead: instant appearance exactly when body finishes (500ms)
      setTimeout(() => {
        head.style.transition = 'none';
        head.style.opacity = '1';
      }, 500);
      // output: short delay after arrowhead
      setTimeout(() => { outEl.style.opacity = '1'; }, 700);
    });
  });

  panel.scrollTop = panel.scrollHeight;
}

/* ====================================================
   PANEL (2,1) — NOTATION
   ==================================================== */
document.getElementById('panel-notation').addEventListener('click', () => {
  if (currentInput === null || notationShown) return;
  notationShown = true;
  addNotationLine(currentInput, currentOutput);
  notationHistory.push({ x: currentInput, y: currentOutput });
});

function addNotationLine(x, y) {
  const panel = document.getElementById('panel-notation');
  const hint  = panel.querySelector('.click-hint');
  if (hint) hint.style.display = 'none';

  // Remove the ghost (we'll re-add it at the end)
  const ghost = document.getElementById('notation-ghost');
  if (ghost) ghost.remove();

  // Build the new line BEFORE the ghost
  const uid = Date.now();
  const line = document.createElement('div');
  line.className = 'notation-line';
  line.innerHTML =
    `<span class="nl-f">f</span>` +
    `<span class="nl-open">(</span>` +
    `<span class="nl-x" id="nx-${uid}" style="display:inline-block;min-width:8px;">&nbsp;</span>` +
    `<span class="nl-close">)</span>` +
    `<span class="nl-eq"> = </span>` +
    `<span class="nl-y" id="ny-${uid}">&nbsp;</span>`;
  panel.appendChild(line);

  // Add a new ghost at the very bottom
  const newGhost = document.createElement('div');
  newGhost.id = 'notation-ghost';
  newGhost.style.cssText = 'font-size:1.3rem; color: var(--gray); opacity:0.35; margin-top:4px;';
  newGhost.innerHTML = `f(<span style="display:inline-block;min-width:8px;">&nbsp;</span>) =`;
  panel.appendChild(newGhost);

  const xEl = line.querySelector(`#nx-${uid}`);
  const yEl = line.querySelector(`#ny-${uid}`);

  // Show x inside parens first
  setTimeout(() => { xEl.textContent = x; }, 300);
  // Show y after
  setTimeout(() => { yEl.textContent = y; }, 700);
  // After 1s turn the whole thing green (except =)
  setTimeout(() => { line.classList.add('nl-all-green'); }, 1700);

  panel.scrollTop = panel.scrollHeight;
}

/* ====================================================
   PANEL (2,2) — TABLE
   ==================================================== */
document.getElementById('panel-table').addEventListener('click', () => {
  if (currentInput === null || tableShown) return;
  tableShown = true;
  addTableRow(currentInput, currentOutput);
  tableHistory.push({ x: currentInput, y: currentOutput });
});

function addTableRow(x, y) {
  const hint = document.querySelector('#panel-table .click-hint');
  if (hint) hint.style.display = 'none';

  const tbody = document.getElementById('table-body');
  const tr = document.createElement('tr');
  tr.className = 'new-row';
  tr.innerHTML = `<td>${x}</td><td>${y}</td>`;
  tbody.appendChild(tr);

  document.getElementById('panel-table').scrollTop =
    document.getElementById('panel-table').scrollHeight;
}
</script>
</body>
</html>
