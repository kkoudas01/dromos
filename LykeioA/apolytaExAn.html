<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Εξισώσεις & Ανισώσεις με Απόλυτα</title>
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sec: #aaaaaa;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --correct: #03dac6;
            --danger: #cf6679;
            --line-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--panel-bg);
            border-bottom: 2px solid #333;
        }

        .home-btn {
            text-decoration: none;
            color: var(--text-main);
            background-color: #333;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.3s;
        }

        .home-btn:hover { background-color: #444; }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            flex-grow: 1;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            justify-content: center;
        }

        .tab-btn {
            background-color: var(--panel-bg);
            color: var(--text-sec);
            border: 2px solid #333;
            padding: 10px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background-color: rgba(187, 134, 252, 0.1);
        }

        .math-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .expression {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .arrow-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            outline: none;
        }

        .arrow-svg {
            width: 60px;
            height: 24px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform-origin: left center;
        }

        @keyframes springAnim {
            0% { transform: scaleX(1); }
            50% { transform: scaleX(1.6); }
            100% { transform: scaleX(1); }
        }

        .spring-active .arrow-svg {
            animation: springAnim 2s infinite ease-in-out;
        }

        .solution-box {
            font-size: 1.8rem;
            color: var(--correct);
            margin-top: 10px;
            min-height: 40px;
            text-align: center;
            font-weight: bold;
        }

        .number-line-container {
            width: 100%;
            margin: 40px 0;
            position: relative;
        }

        svg.number-line {
            width: 100%;
            height: 180px;
            overflow: visible;
        }

        @keyframes blinkAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .blinking {
            animation: blinkAnim 1s infinite;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .controls.visible {
            visibility: visible;
            opacity: 1;
        }

        .btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: var(--accent);
            color: #000;
        }

        footer {
            text-align: right;
            padding: 15px 20px;
            font-size: 0.9rem;
            color: var(--text-sec);
            border-top: 1px solid #333;
        }

        @media (max-width: 600px) {
            .expression { font-size: 1.8rem; }
            .solution-box { font-size: 1.3rem; }
            .tab-btn { padding: 8px 15px; font-size: 1rem; }
            svg.number-line { height: 140px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="home-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Αρχική
        </a>
        <h1>Απόλυτες Τιμές</h1>
        <div style="width: 80px;"></div> <!-- Spacer for flex balance -->
    </header>

    <main>
        <div class="tabs">
            <button class="tab-btn active" id="tab-eq" onclick="switchTab('eq')">Εξίσωση</button>
            <button class="tab-btn" id="tab-ineq" onclick="switchTab('ineq')">Ανίσωση</button>
        </div>

        <div class="math-container">
            <div id="expression" class="expression">|x| = 5</div>
            <button id="arrow-btn" class="arrow-btn spring-active" onclick="handleArrowClick()">
                <svg class="arrow-svg" viewBox="0 0 60 20">
                    <path d="M0,6 L40,6 M0,14 L40,14 M35,2 L45,10 L35,18" />
                </svg>
            </button>
        </div>

        <div id="solution" class="solution-box"></div>

        <div class="number-line-container">
            <svg id="nl-canvas" class="number-line" viewBox="0 0 1200 180" preserveAspectRatio="xMidYMid meet"></svg>
        </div>

        <div id="controls" class="controls">
            <button class="btn" onclick="refreshCurrent()">Ανανέωση</button>
            <button class="btn" onclick="nextLevel()">Επόμενο</button>
        </div>
    </main>

    <footer>
        Δημιουργία: Κώστας Κούδας
    </footer>

    <script>
        // State Management
        let currentTab = 'eq';
        let currentLevel = 1; 
        /* 
           Eq levels: 1: |x|=a, 2: |x-c|=a (c>0), 3: |x-c|=a (c can be <0)
           Ineq levels: 1: |x|<a, 2: |x|<=a, 3: |x|>a, 4: |x|>=a, 5-8: same but with |x-c|
        */
        let animStep = 0; // 0: start, 1: brackets, 2: blink, 3: solution
        let a = 0;
        let c = 0;

        // Helper for random integers between min and max (inclusive)
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function formatMath(c_val) {
            if (c_val === 0) return "x";
            if (c_val > 0) return `x - ${c_val}`;
            return `x + ${Math.abs(c_val)}`;
        }

        function generateProblem() {
            animStep = 0;
            document.getElementById('solution').innerText = "";
            document.getElementById('controls').classList.remove('visible');
            
            const arrowBtn = document.getElementById('arrow-btn');
            arrowBtn.classList.add('spring-active');
            arrowBtn.style.display = 'block';

            if (currentTab === 'eq') {
                if (currentLevel === 1) {
                    c = 0;
                    a = randInt(2, 7);
                } else if (currentLevel === 2) {
                    c = randInt(1, 5);
                    a = randInt(2, 6);
                } else {
                    do { c = randInt(-5, 5); } while (c === 0);
                    a = randInt(2, 6);
                }
                document.getElementById('expression').innerText = `|${formatMath(c)}| = ${a}`;
            } else {
                // Inequalities
                if (currentLevel <= 4) {
                    c = 0;
                    a = randInt(2, 7);
                } else {
                    do { c = randInt(-5, 5); } while (c === 0);
                    a = randInt(2, 6);
                }
                
                let symbol = "";
                let type = (currentLevel - 1) % 4; // 0: <, 1: <=, 2: >, 3: >=
                if (type === 0) symbol = "<";
                if (type === 1) symbol = "\u2264"; // <=
                if (type === 2) symbol = ">";
                if (type === 3) symbol = "\u2265"; // >=

                document.getElementById('expression').innerText = `|${formatMath(c)}| ${symbol} ${a}`;
            }

            drawNumberLine();
        }

        function switchTab(tabId) {
            currentTab = tabId;
            currentLevel = 1;
            document.getElementById('tab-eq').classList.remove('active');
            document.getElementById('tab-ineq').classList.remove('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            generateProblem();
        }

        function refreshCurrent() {
            generateProblem();
        }

        function nextLevel() {
            if (currentTab === 'eq') {
                if (currentLevel < 3) currentLevel++;
            } else {
                if (currentLevel < 8) currentLevel++;
            }
            generateProblem();
        }

        function handleArrowClick() {
            if (animStep >= 3) return; // Prevent clicks after end

            animStep++;
            
            if (animStep === 3) {
                document.getElementById('arrow-btn').classList.remove('spring-active');
                showSolution();
                document.getElementById('controls').classList.add('visible');
            }
            
            drawNumberLine(); // Redraw based on new animStep
        }

        function drawNumberLine() {
            const svg = document.getElementById('nl-canvas');
            svg.innerHTML = ""; // Clear

            const w = 1200;
            const h = 180;
            const centerY = 120; // Y pos for the line

            // Math ranges
            const minX = c - 2.2 * a;
            const maxX = c + 2.2 * a;

            // Map math value to SVG X coordinate
            function mapX(val) {
                return 60 + (w - 120) * ((val - minX) / (maxX - minX));
            }

            // Create SVG element helper
            function createEl(tag, attrs) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
                for (let k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            // 1. Draw Base Axis
            svg.appendChild(createEl("line", { x1: 20, y1: centerY, x2: w-20, y2: centerY, stroke: "var(--line-color)", "stroke-width": 4 }));
            
            // Left Infinity Arrow & Text
            svg.appendChild(createEl("path", { d: `M40,${centerY-8} L20,${centerY} L40,${centerY+8}`, fill: "none", stroke: "var(--line-color)", "stroke-width": 4 }));
            const textNegInf = createEl("text", { x: 30, y: centerY + 35, fill: "var(--text-main)", "font-size": "24", "text-anchor": "middle" });
            textNegInf.textContent = "-\u221E";
            svg.appendChild(textNegInf);

            // Right Infinity Arrow & Text
            svg.appendChild(createEl("path", { d: `M${w-40},${centerY-8} L${w-20},${centerY} L${w-40},${centerY+8}`, fill: "none", stroke: "var(--line-color)", "stroke-width": 4 }));
            const textPosInf = createEl("text", { x: w-30, y: centerY + 35, fill: "var(--text-main)", "font-size": "24", "text-anchor": "middle" });
            textPosInf.textContent = "+\u221E";
            svg.appendChild(textPosInf);

            // 2. Draw Ticks & Numbers
            const pointsToMark = [];
            for (let val = Math.ceil(minX); val <= Math.floor(maxX); val++) {
                pointsToMark.push(val);
            }

            pointsToMark.forEach(val => {
                const vx = mapX(val);
                svg.appendChild(createEl("line", { x1: vx, y1: centerY-8, x2: vx, y2: centerY+8, stroke: "var(--line-color)", "stroke-width": 3 }));
                const text = createEl("text", { x: vx, y: centerY + 35, fill: "var(--text-main)", "font-size": "22", "text-anchor": "middle" });
                text.textContent = val;
                svg.appendChild(text);
            });

            // STEP 1 & ONWARDS: BRACKETS
            if (animStep >= 1) {
                // Bracket from c to c+a
                const xCenter = mapX(c);
                const xRight = mapX(c+a);
                const xLeft = mapX(c-a);
                const brY = centerY - 30;
                const topY = brY - 15;
                
                // Right bracket (Center to Right)
                svg.appendChild(createEl("path", { 
                    d: `M${xCenter},${brY} L${xCenter},${topY} L${xRight},${topY} L${xRight},${brY}`, 
                    fill: "none", stroke: "var(--accent)", "stroke-width": 3 
                }));
                const labelR = createEl("text", { x: (xCenter+xRight)/2, y: topY - 10, fill: "var(--accent)", "font-size": "20", "text-anchor": "middle" });
                labelR.textContent = a;
                svg.appendChild(labelR);

                // Left bracket (Left to Center)
                svg.appendChild(createEl("path", { 
                    d: `M${xLeft},${brY} L${xLeft},${topY} L${xCenter},${topY} L${xCenter},${brY}`, 
                    fill: "none", stroke: "var(--accent)", "stroke-width": 3 
                }));
                const labelL = createEl("text", { x: (xLeft+xCenter)/2, y: topY - 10, fill: "var(--accent)", "font-size": "20", "text-anchor": "middle" });
                labelL.textContent = a;
                svg.appendChild(labelL);
            }

            // STEP 2 & ONWARDS: HIGHLIGHTS / BLINKING
            if (animStep >= 2) {
                const blinkClass = animStep === 2 ? "blinking" : "";
                const hlColor = "var(--correct)";
                const rLeft = mapX(c-a);
                const rRight = mapX(c+a);

                if (currentTab === 'eq') {
                    // Just two solid points
                    const p1 = createEl("circle", { cx: rLeft, cy: centerY, r: 8, fill: hlColor });
                    const p2 = createEl("circle", { cx: rRight, cy: centerY, r: 8, fill: hlColor });
                    if(blinkClass) { p1.classList.add(blinkClass); p2.classList.add(blinkClass); }
                    svg.appendChild(p1);
                    svg.appendChild(p2);
                } else {
                    let type = (currentLevel - 1) % 4; // 0: <, 1: <=, 2: >, 3: >=
                    let isClosed = (type === 1 || type === 3);
                    let isInner = (type === 0 || type === 1);

                    // Draw Thick Lines
                    const linesGrp = createEl("g", {});
                    if (isInner) {
                        linesGrp.appendChild(createEl("line", { x1: rLeft, y1: centerY, x2: rRight, y2: centerY, stroke: hlColor, "stroke-width": 9 }));
                    } else {
                        linesGrp.appendChild(createEl("line", { x1: 20, y1: centerY, x2: rLeft, y2: centerY, stroke: hlColor, "stroke-width": 9 }));
                        linesGrp.appendChild(createEl("line", { x1: rRight, y1: centerY, x2: w-20, y2: centerY, stroke: hlColor, "stroke-width": 9 }));
                        // Redraw inner arrows over thick line
                        linesGrp.appendChild(createEl("path", { d: `M40,${centerY-8} L20,${centerY} L40,${centerY+8}`, fill: "none", stroke: hlColor, "stroke-width": 4 }));
                        linesGrp.appendChild(createEl("path", { d: `M${w-40},${centerY-8} L${w-20},${centerY} L${w-40},${centerY+8}`, fill: "none", stroke: hlColor, "stroke-width": 4 }));
                    }
                    if(blinkClass) linesGrp.classList.add(blinkClass);
                    svg.appendChild(linesGrp);

                    // Draw Circles
                    const circGrp = createEl("g", {});
                    const c1 = createEl("circle", { cx: rLeft, cy: centerY, r: 8, stroke: hlColor, "stroke-width": 3, fill: isClosed ? hlColor : "var(--bg-color)" });
                    const c2 = createEl("circle", { cx: rRight, cy: centerY, r: 8, stroke: hlColor, "stroke-width": 3, fill: isClosed ? hlColor : "var(--bg-color)" });
                    circGrp.appendChild(c1);
                    circGrp.appendChild(c2);
                    if(blinkClass) circGrp.classList.add(blinkClass);
                    svg.appendChild(circGrp);
                }
            }
        }

        function showSolution() {
            let solText = "";
            let v1 = c - a;
            let v2 = c + a;

            if (currentTab === 'eq') {
                solText = `x = ${v1}  ή  x = ${v2}`;
            } else {
                let type = (currentLevel - 1) % 4; // 0: <, 1: <=, 2: >, 3: >=
                if (type === 0) solText = `${v1} < x < ${v2}`;
                if (type === 1) solText = `${v1} \u2264 x \u2264 ${v2}`;
                if (type === 2) solText = `x < ${v1}  ή  x > ${v2}`;
                if (type === 3) solText = `x \u2264 ${v1}  ή  x \u2265 ${v2}`;
            }

            document.getElementById('solution').innerText = solText;
        }

        // Initialize on load
        window.onload = () => {
            generateProblem();
        };
    </script>
</body>
</html>
