<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Διαδραστικές Ταυτότητες</title>
    <style>
        :root {
            --bg-color: #3b3b3b;
            --red-color: #ff0000;
            --yellow-color: #ffff00;
            --green-color: #00b050;
            --text-color: #ffffff;
            --input-bg: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            background: #555;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #777; }

        .signature {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 60px;
            max-width: 1000px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .id-btn {
            background-color: #444;
            color: var(--text-color);
            font-family: "Times New Roman", Times, serif;
            font-size: 1.4rem;
            font-style: italic;
            border: 4px solid;
            border-radius: 10px;
            padding: 15px 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-align: center;
        }
        .id-btn:hover { transform: scale(1.05); background-color: #555; }

        .red-btn { border-color: var(--red-color); }
        .yellow-btn { border-color: var(--yellow-color); }
        .green-btn { border-color: var(--green-color); width: 100%; max-width: 800px; margin-top: 10px; }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #333;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-family: "Times New Roman", Times, serif;
            font-size: 1.5rem;
            font-style: italic;
            overflow-x: auto;
        }

        .modal-header {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            font-style: normal;
        }
        .icon-btn:hover { color: #ccc; }

        .calc-grid {
            display: grid;
            grid-template-columns: max-content max-content auto;
            row-gap: 15px;
            column-gap: 10px;
            align-items: center;
        }

        .var-input {
            width: 50px;
            background: var(--input-bg);
            color: white;
            border: 1px solid #777;
            border-radius: 5px;
            text-align: center;
            font-family: "Times New Roman", Times, serif;
            font-size: 1.3rem;
            font-style: italic;
            padding: 2px;
        }

        /* Στυλ για όταν "κλειδώνει" το input και γίνεται απλό κείμενο */
        .locked-var {
            color: var(--yellow-color);
            font-weight: bold;
            padding: 0 2px;
        }

        .eq-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            font-family: "Times New Roman", Times, serif;
        }

        .flash {
            animation: blink 0.8s infinite;
            color: var(--yellow-color);
            font-weight: bold;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .check-icon { color: limegreen; margin-left: 15px; font-style: normal; }

        @media (max-width: 768px) {
            .id-btn { font-size: 1.1rem; padding: 10px 15px; }
            .modal-content { font-size: 1.2rem; }
            .var-input { width: 40px; font-size: 1.1rem; }
            .calc-grid { column-gap: 5px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">🔙 Επιστροφή</a>

    <div class="main-container">
        <!-- Κόκκινες Ταυτότητες -->
        <div class="column">
            <button class="id-btn red-btn" onclick="openModal(1)">(α + β)<sup>2</sup> = α<sup>2</sup> + 2 &middot; α &middot; β + β<sup>2</sup></button>
            <button class="id-btn red-btn" onclick="openModal(2)">(α - β)<sup>2</sup> = α<sup>2</sup> - 2 &middot; α &middot; β + β<sup>2</sup></button>
            <button class="id-btn red-btn" onclick="openModal(3)">(α - β) &middot; (α + β) = α<sup>2</sup> - β<sup>2</sup></button>
        </div>
        
        <!-- Κίτρινες Ταυτότητες -->
        <div class="column">
            <button class="id-btn yellow-btn" onclick="openModal(4)">(α + β)<sup>3</sup> = α<sup>3</sup> + 3 &middot; α<sup>2</sup> &middot; β + 3 &middot; α &middot; β<sup>2</sup> + β<sup>3</sup></button>
            <button class="id-btn yellow-btn" onclick="openModal(5)">(α - β)<sup>3</sup> = α<sup>3</sup> - 3 &middot; α<sup>2</sup> &middot; β + 3 &middot; α &middot; β<sup>2</sup> - β<sup>3</sup></button>
            <button class="id-btn yellow-btn" onclick="openModal(6)">α<sup>3</sup> - β<sup>3</sup> = (α - β)(α<sup>2</sup> + α &middot; β + β<sup>2</sup>)</button>
            <button class="id-btn yellow-btn" onclick="openModal(7)">α<sup>3</sup> + β<sup>3</sup> = (α + β)(α<sup>2</sup> - α &middot; β + β<sup>2</sup>)</button>
        </div>

        <!-- Πράσινη Ταυτότητα -->
        <button class="id-btn green-btn" onclick="openModal(8)">(α + β + γ)<sup>2</sup> = α<sup>2</sup> + β<sup>2</sup> + γ<sup>2</sup> + 2 &middot; α &middot; β + 2 &middot; α &middot; γ + 2 &middot; β &middot; γ</button>
    </div>

    <!-- Modal Pop-up -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <button class="icon-btn" onclick="refreshModal()" title="Ανανέωση">🔄</button>
                <button class="icon-btn" onclick="closeModal()" title="Κλείσιμο">✖</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="calc-grid" id="calcGrid">
                    <!-- Δυναμικό Περιεχόμενο -->
                </div>
            </div>
        </div>
    </div>

    <div class="signature">Κώστας Κούδας</div>

    <script>
        // --- Μαθηματική Μηχανή Μονωνύμων --- //
        
        // Μετατροπή string σε αντικείμενο μονωνύμου (π.χ. "-3x" -> {c:-3, v:"x"})
        function parseMonomial(s) {
            s = s.trim().replace(/\s+/g, '');
            if (!s) return { c: 0, v: "" };
            let match = s.match(/^([+-]?\d*)([a-zA-Zα-ωΑ-Ω]*)$/);
            if (!match) return { c: 1, v: s }; 
            let cStr = match[1];
            let vStr = match[2];
            let c = 1;
            if (cStr === '-') c = -1;
            else if (cStr === '+') c = 1;
            else if (cStr !== '') c = parseInt(cStr, 10);
            return { c: c, v: vStr };
        }

        // Μορφοποίηση μονωνύμου σε string για εμφάνιση
        function formatTerm(term, isFirst) {
            let { c, v } = term;
            if (c === 0) return "";
            let sign = "";
            if (c > 0) sign = isFirst ? "" : " + ";
            else sign = isFirst ? "-" : " - ";
            let absC = Math.abs(c);
            let coeffStr = (absC === 1 && v !== "") ? "" : absC.toString();
            return sign + coeffStr + v;
        }

        // Υπολογισμός Δύναμης
        function calcPow(term, p) {
            let c = Math.pow(term.c, p);
            let v = term.v !== "" ? term.v + "^" + p : "";
            return { c, v };
        }

        // Πολλαπλασιασμός όρων
        function calcMul(...terms) {
            let c = 1; let v = "";
            for (let t of terms) { c *= t.c; v += t.v; }
            return { c, v };
        }

        // Έλεγχος αν ο όρος χρειάζεται παρενθέσεις κατά την αντικατάσταση
        function wrap(s) {
            s = s.trim();
            if (!/^[a-zA-Zα-ωΑ-Ω]$/.test(s)) {
                return `(${s})`;
            }
            return s;
        }

        function toHtmlMath(str) {
            return str.replace(/\^(\d+)/g, '<sup>$1</sup>');
        }

        // --- Δεδομένα Ταυτοτήτων --- //
        
        const identities = {
            1: {
                vars: ['A', 'B'],
                lhs: '(<input id="inp_A" class="var-input" placeholder="α"> + <input id="inp_B" class="var-input" placeholder="β">)<sup>2</sup>',
                step1: (a, b) => `${wrap(a)}<sup>2</sup> + 2 &middot; ${wrap(a)} &middot; ${wrap(b)} + ${wrap(b)}<sup>2</sup>`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    return toHtmlMath(formatTerm(calcPow(tA,2),true) + formatTerm(calcMul({c:2,v:""},tA,tB),false) + formatTerm(calcPow(tB,2),false));
                }
            },
            2: {
                vars: ['A', 'B'],
                lhs: '(<input id="inp_A" class="var-input" placeholder="α"> - <input id="inp_B" class="var-input" placeholder="β">)<sup>2</sup>',
                step1: (a, b) => `${wrap(a)}<sup>2</sup> - 2 &middot; ${wrap(a)} &middot; ${wrap(b)} + ${wrap(b)}<sup>2</sup>`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    return toHtmlMath(formatTerm(calcPow(tA,2),true) + formatTerm(calcMul({c:-2,v:""},tA,tB),false) + formatTerm(calcPow(tB,2),false));
                }
            },
            3: {
                vars: ['A', 'B'],
                lhs: '(<input id="inp_A" class="var-input" placeholder="α" oninput="syncInputs()"> - <input id="inp_B" class="var-input" placeholder="β" oninput="syncInputs()">) &middot; (<span class="sync_A">α</span> + <span class="sync_B">β</span>)',
                step1: (a, b) => `${wrap(a)}<sup>2</sup> - ${wrap(b)}<sup>2</sup>`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    let t2 = calcPow(tB,2); t2.c = -t2.c;
                    return toHtmlMath(formatTerm(calcPow(tA,2),true) + formatTerm(t2,false));
                }
            },
            4: {
                vars: ['A', 'B'],
                lhs: '(<input id="inp_A" class="var-input" placeholder="α"> + <input id="inp_B" class="var-input" placeholder="β">)<sup>3</sup>',
                step1: (a, b) => `${wrap(a)}<sup>3</sup> + 3 &middot; ${wrap(a)}<sup>2</sup> &middot; ${wrap(b)} + 3 &middot; ${wrap(a)} &middot; ${wrap(b)}<sup>2</sup> + ${wrap(b)}<sup>3</sup>`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    return toHtmlMath(formatTerm(calcPow(tA,3),true) + formatTerm(calcMul({c:3,v:""},calcPow(tA,2),tB),false) + formatTerm(calcMul({c:3,v:""},tA,calcPow(tB,2)),false) + formatTerm(calcPow(tB,3),false));
                }
            },
            5: {
                vars: ['A', 'B'],
                lhs: '(<input id="inp_A" class="var-input" placeholder="α"> - <input id="inp_B" class="var-input" placeholder="β">)<sup>3</sup>',
                step1: (a, b) => `${wrap(a)}<sup>3</sup> - 3 &middot; ${wrap(a)}<sup>2</sup> &middot; ${wrap(b)} + 3 &middot; ${wrap(a)} &middot; ${wrap(b)}<sup>2</sup> - ${wrap(b)}<sup>3</sup>`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    let t4 = calcPow(tB,3); t4.c = -t4.c;
                    return toHtmlMath(formatTerm(calcPow(tA,3),true) + formatTerm(calcMul({c:-3,v:""},calcPow(tA,2),tB),false) + formatTerm(calcMul({c:3,v:""},tA,calcPow(tB,2)),false) + formatTerm(t4,false));
                }
            },
            6: {
                vars: ['A', 'B'],
                lhs: '<input id="inp_A" class="var-input" placeholder="α"><sup>3</sup> - <input id="inp_B" class="var-input" placeholder="β"><sup>3</sup>',
                step1: (a, b) => `(${a} - ${wrap(b)})(${wrap(a)}<sup>2</sup> + ${wrap(a)} &middot; ${wrap(b)} + ${wrap(b)}<sup>2</sup>)`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    let poly = formatTerm(calcPow(tA,2),true) + formatTerm(calcMul({c:1,v:""},tA,tB),false) + formatTerm(calcPow(tB,2),false);
                    return `(${a} - ${wrap(b)})(` + toHtmlMath(poly) + `)`;
                }
            },
            7: {
                vars: ['A', 'B'],
                lhs: '<input id="inp_A" class="var-input" placeholder="α"><sup>3</sup> + <input id="inp_B" class="var-input" placeholder="β"><sup>3</sup>',
                step1: (a, b) => `(${a} + ${wrap(b)})(${wrap(a)}<sup>2</sup> - ${wrap(a)} &middot; ${wrap(b)} + ${wrap(b)}<sup>2</sup>)`,
                step2: (a, b) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b);
                    let poly = formatTerm(calcPow(tA,2),true) + formatTerm(calcMul({c:-1,v:""},tA,tB),false) + formatTerm(calcPow(tB,2),false);
                    return `(${a} + ${wrap(b)})(` + toHtmlMath(poly) + `)`;
                }
            },
            8: {
                vars: ['A', 'B', 'C'],
                lhs: '(<input id="inp_A" class="var-input" placeholder="α"> + <input id="inp_B" class="var-input" placeholder="β"> + <input id="inp_C" class="var-input" placeholder="γ">)<sup>2</sup>',
                step1: (a, b, c) => `${wrap(a)}<sup>2</sup> + ${wrap(b)}<sup>2</sup> + ${wrap(c)}<sup>2</sup> + 2 &middot; ${wrap(a)} &middot; ${wrap(b)} + 2 &middot; ${wrap(a)} &middot; ${wrap(c)} + 2 &middot; ${wrap(b)} &middot; ${wrap(c)}`,
                step2: (a, b, c) => {
                    let tA = parseMonomial(a), tB = parseMonomial(b), tC = parseMonomial(c);
                    return toHtmlMath(
                        formatTerm(calcPow(tA,2),true) + formatTerm(calcPow(tB,2),false) + formatTerm(calcPow(tC,2),false) + 
                        formatTerm(calcMul({c:2,v:""},tA,tB),false) + formatTerm(calcMul({c:2,v:""},tA,tC),false) + formatTerm(calcMul({c:2,v:""},tB,tC),false)
                    );
                }
            }
        };

        // --- Logic του Εφαρμογής --- //
        
        let currentId = null;
        let inputsData = [];

        function syncInputs() {
            let a = document.getElementById('inp_A')?.value || 'α';
            let b = document.getElementById('inp_B')?.value || 'β';
            document.querySelectorAll('.sync_A').forEach(el => el.innerText = a);
            document.querySelectorAll('.sync_B').forEach(el => el.innerText = b);
        }

        function openModal(id) {
            currentId = id;
            document.getElementById('modalOverlay').style.display = 'flex';
            refreshModal();
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function refreshModal() {
            let identity = identities[currentId];
            let grid = document.getElementById('calcGrid');
            
            grid.innerHTML = `
                <div id="lhs_col" style="justify-self: end;">${identity.lhs}</div>
                <div><button class="eq-btn flash" id="eq_btn_0" onclick="processStep(0)">=</button></div>
                <div id="rhs_col_0"></div>
            `;
        }

        function processStep(step) {
            let identity = identities[currentId];
            let grid = document.getElementById('calcGrid');

            if (step === 0) {
                // Έλεγχος & Ανάγνωση Input
                inputsData = [];
                for (let v of identity.vars) {
                    let val = document.getElementById('inp_' + v).value.trim();
                    if (!val) {
                        alert("Παρακαλώ συμπληρώστε όλα τα κελιά!");
                        return;
                    }
                    inputsData.push(val);
                }

                // Μετατροπή των Input σε απλό κείμενο (ώστε να φαίνεται τέλεια η εξίσωση)
                identity.vars.forEach((v, index) => {
                    let inp = document.getElementById('inp_' + v);
                    let val = inputsData[index];
                    let span = document.createElement('span');
                    span.className = 'locked-var';
                    span.innerText = val;
                    inp.parentNode.replaceChild(span, inp);
                });

                // Ενημέρωση και των συγχρονισμένων span (αν υπάρχουν, π.χ. στην Ταυτότητα 3)
                document.querySelectorAll('.sync_A').forEach(el => el.classList.add('locked-var'));
                document.querySelectorAll('.sync_B').forEach(el => el.classList.add('locked-var'));

                // Σταματάμε να αναβοσβήνει το πρώτο =
                let btn0 = document.getElementById('eq_btn_0');
                btn0.classList.remove('flash');
                btn0.onclick = null;

                // Εμφάνιση του Step 1 (Αντικατάσταση)
                let step1Html = identity.step1(...inputsData);
                document.getElementById('rhs_col_0').innerHTML = step1Html;

                // Έλεγχος αν χρειάζεται 2ο βήμα
                let needsStep2 = inputsData.some(val => !/^[a-zA-Zα-ωΑ-Ω]$/.test(val));

                if (needsStep2) {
                    grid.innerHTML += `
                        <div></div>
                        <div><button class="eq-btn flash" id="eq_btn_1" onclick="processStep(1)">=</button></div>
                        <div id="rhs_col_1"></div>
                    `;
                } else {
                    document.getElementById('rhs_col_0').innerHTML += '<span class="check-icon">✔️</span>';
                }
            } 
            else if (step === 1) {
                let btn1 = document.getElementById('eq_btn_1');
                btn1.classList.remove('flash');
                btn1.onclick = null;

                let step2Html = identity.step2(...inputsData);
                document.getElementById('rhs_col_1').innerHTML = step2Html + '<span class="check-icon">✔️</span>';
            }
        }
    </script>

</body>
</html>
